            }).join('');
            // 전용/공유 개수 계산
            const exclCount=stocks.filter(s=>exclusiveLotSet.has(s.item_code)||(s.restrict_type==='특정제품전용'&&(allowedMap[s.item_code]||[]).length===1&&(allowedMap[s.item_code]||[])[0]===p.product_code)).length;
            const shrdCount=stocks.length-exclCount;
            const summaryLabel=(exclCount>0&&shrdCount>0)
              ?`<span style="color:var(--accent);font-weight:700">전용 ${exclCount}종</span><span style="color:var(--text3);margin:0 3px">·</span><span style="color:#7c3aed;font-weight:700">공유 ${shrdCount}종</span>`
              :exclCount>0
                ?`<span style="color:var(--accent);font-weight:700">전용 ${exclCount}종</span>`

              평균 생산량 <strong style="color:var(--text)">${r.avgKgDay>0?r.avgKgDay.toFixed(1)+' kg/일':'생산 데이터 없음'}</strong>
              ${r.minDday!==null?` &nbsp;·&nbsp; 최소 D-day <strong style="color:${statusColor}">${r.minDday}일</strong>`:''}
            </div>
          </div>
        </div>
        <div class="table-wrap">
          <table style="width:100%;border-collapse:collapse;font-size:13px">
            <thead>
              <tr style="background:var(--bg3)">
                <th rowspan="2" style="padding:7px 12px;text-align:left;font-size:11px;color:var(--text2);font-weight:700;vertical-align:middle">원산지 · 가공방식</th>
                <th rowspan="2" style="padding:7px 12px;text-align:center;font-size:11px;color:var(--text2);font-weight:700;vertical-align:middle">배합비율</th>

              <tr style="background:var(--bg3)">
                <th style="padding:5px 12px;text-align:right;font-size:10px;color:var(--accent);font-weight:600">재고</th>
                <th style="padding:5px 12px;text-align:right;font-size:10px;color:var(--accent);font-weight:600">1일소모</th>
                <th style="padding:5px 12px;text-align:center;font-size:10px;color:var(--accent);font-weight:600" title="이 원두에만 단독 사용되는 생두 기준">D-day</th>
                <th style="padding:5px 12px;text-align:right;font-size:10px;color:#7c3aed;font-weight:600">재고</th>
                <th style="padding:5px 12px;text-align:right;font-size:10px;color:#7c3aed;font-weight:600">1일소모</th>
                <th style="padding:5px 12px;text-align:center;font-size:10px;color:#7c3aed;font-weight:600" title="공유 원두 전체 1일 사용량 합계 기준">D-day</th>
              </tr>
            </thead>
            <tbody>${bомRowsHtml}</tbody>
          </table>
        </div>
      </div>`;
    }).join('');
  }

  mc.innerHTML=`
  <div class="page-header">
    <div class="page-title">원두별 생두 현황</div>
    <div class="page-sub">기준일 ${maxDate||'-'} · 원두별 투입 생두의 재고·D-day 분석 (원산지+가공방식 매칭)</div>
  </div>
  <div class="kpi-grid">
    <div class="kpi-card danger"><div class="kpi-label">위험 원두</div><div class="kpi-value">${productResults.filter(r=>r.worstStatus==='danger').length}</div><div class="kpi-sub">생두 부족 위험</div></div>
    <div class="kpi-card warning"><div class="kpi-label">주의 원두</div><div class="kpi-value">${productResults.filter(r=>r.worstStatus==='warning').length}</div><div class="kpi-sub">재고 보충 검토</div></div>
    <div class="kpi-card success"><div class="kpi-label">정상 원두</div><div class="kpi-value">${productResults.filter(r=>r.worstStatus==='normal').length}</div><div class="kpi-sub">여유 있음</div></div>
    <div class="kpi-card"><div class="kpi-label">전체 원두</div><div class="kpi-value">${productResults.length}</div><div class="kpi-sub">활성 원두 수</div></div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
    <span style="font-size:13px;color:var(--text2);font-weight:500">계산 기간:</span>
    ${[7,30,90].map(d=>`<button class="btn btn-sm ${usedDays===d?'btn-gold':'btn-outline'}" onclick="setPsAvgDays(${d})">${d}일</button>`).join('')}
    <span style="font-size:11px;color:var(--accent);font-weight:500">${window.getDaysRangeLabel(usedDays)}</span>
    <span style="font-size:11px;color:var(--text3);margin-left:8px">선택 기간의 생산량 기준으로 1일 사용량 계산</span>
    <div style="margin-left:auto;display:flex;gap:6px">
      <button id="ps-f-all" class="btn btn-sm btn-gold" onclick="renderPsCards('all')">전체</button>
      <button id="ps-f-danger" class="btn btn-sm btn-outline" onclick="renderPsCards('danger')">⚠️ 위험만</button>
      <button id="ps-f-warning" class="btn btn-sm btn-outline" onclick="renderPsCards('warning')">⚡ 주의만</button>
      <button id="ps-f-normal" class="btn btn-sm btn-outline" onclick="renderPsCards('normal')">✅ 정상만</button>
    </div>
  </div>
  <div id="ps-cards"></div>`;

  window.renderPsCards=renderPsCards;
  window.setPsAvgDays=(d)=>{window._psAvgDays=d;window._tabs['product-stock']();};
  renderPsCards(window._psFilter||'all');
};

// ══ 설정
window._tabs['settings']=async()=>{
  const mc=el('main-content');mc.innerHTML='<div class="loading">로딩 중...</div>';
  const[{data:settings},{data:users},{data:originData}]=await Promise.all([sb.from('momos_app_settings').select('*'),sb.from('momos_users').select('id,username,role,is_active,created_at,last_login_at').order('created_at'),sb.from('momos_green_bean_items').select('origin').eq('is_active',true)]);
  const origins=[...new Set((originData||[]).map(r=>r.origin).filter(Boolean))].sort();
  const cfg={};(settings||[]).forEach(r=>cfg[r.key]=r.value);
  mc.innerHTML=`
  <div class="page-header"><div class="page-title">설정</div><div class="page-sub">시스템 계산 파라미터 및 사용자 관리</div></div>
  <div class="card" style="margin-bottom:20px">
    <div style="font-size:14px;font-weight:700;margin-bottom:18px">계산 파라미터</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px">
      ${[['avg_production_days','평균 생산량 기간 (일)','30','D-day 계산 기준'],['safety_buffer_days','안전재고 기본 기준 (일)','14','기본 안전재고 임계값'],['lead_time_days','리드타임 (일)','14','구매 필요 분석 기준'],['slow_moving_days','장기보관 기준 (일)','90','저회전 분석 기준'],['slow_moving_kg_per_day','저회전 기준 (kg/일)','1.0','이 미만은 저회전'],['aged_stock_days','노화재고 기준 (일)','180','품질 저하 우려']].map(([key,label,def,desc])=>`<div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:16px"><div style="font-size:13px;font-weight:600;margin-bottom:4px">${label}</div><div style="font-size:11px;color:var(--text2);margin-bottom:10px">${desc}</div><div style="display:flex;gap:8px;align-items:center"><input class="inp" type="number" id="cfg-${key}" value="${cfg[key]||def}" step="0.1" min="0" style="width:100px"><button class="btn btn-sm btn-gold" onclick="saveCfg('${key}','cfg-${key}')">저장</button></div></div>`).join('')}
    </div>
  </div>
  <div class="card" style="margin-bottom:20px">
    <div style="font-size:14px;font-weight:700;margin-bottom:6px">원산지별 목표 보유 배수</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:16px">미입력 시 기본 1배 적용 · 구매 필요 분석에서 원산지별로 우선 적용됩니다</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px">
      ${origins.map(origin=>{
        const key='target_multiplier_'+origin.replace(/\s+/g,'_');
        const val=cfg[key]||'';
        return`<div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px">
          <div style="font-size:13px;font-weight:600;margin-bottom:8px">${origin}</div>
          <div style="display:flex;gap:8px;align-items:center">
            <input class="inp" type="number" id="cfg-${key}" value="${val}" step="0.1" min="0" placeholder="${cfg['target_stock_multiplier']||'2.0'}" style="width:80px">
            <span style="font-size:12px;color:var(--text2)">배</span>
            <button class="btn btn-sm btn-gold" onclick="saveCfg('${key}','cfg-${key}')">저장</button>
            ${val?`<button class="btn btn-sm btn-outline" onclick="deleteCfg('${key}')">초기화</button>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:700;margin-bottom:16px">사용자 관리</div>
    <div class="table-wrap"><table>
      <thead><tr><th>아이디</th><th>권한</th><th>사용여부</th><th>최근 로그인</th><th>가입일</th><th></th></tr></thead>
      <tbody>${!users||!users.length?`<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--text2)">등록된 사용자가 없습니다.</td></tr>`:users.map(u=>`<tr><td><strong>${u.username}</strong></td><td><span class="badge ${u.role==='admin'?'badge-accent':'badge-gray'}">${u.role==='admin'?'관리자':'일반'}</span></td><td><span class="badge ${u.is_active?'badge-success':'badge-gray'}">${u.is_active?'활성':'비활성'}</span></td><td class="text-muted" style="font-size:12px">${u.last_login_at?new Date(u.last_login_at).toLocaleString('ko-KR'):'-'}</td><td class="text-muted" style="font-size:12px">${u.created_at?new Date(u.created_at).toLocaleDateString('ko-KR'):'-'}</td><td style="display:flex;gap:6px;flex-wrap:wrap"><button class="btn btn-sm btn-outline" onclick="toggleUserRole('${u.id}','${u.role}')">${u.role==='admin'?'일반으로':'관리자로'}</button><button class="btn btn-sm ${u.is_active?'btn-danger-outline':'btn-outline'}" onclick="toggleUserActive('${u.id}',${u.is_active})">${u.is_active?'비활성':'활성'}</button><button class="btn btn-sm btn-danger-outline" onclick="deleteUser('${u.id}','${u.username}')">삭제</button></td></tr>`).join('')}</tbody>
    </table></div>
  </div>`;
  window.saveCfg=async(key,elId)=>{const val=el(elId).value;if(!val)return alert('값을 입력하세요.');const{error}=await sb.from('momos_app_settings').upsert({key,value:val});if(error)return alert('저장 실패: '+error.message);alert('저장되었습니다.');window._tabs['settings']();};
  window.deleteCfg=async(key)=>{if(!confirm('이 원산지 설정을 초기화하시겠습니까?\n기본 배수로 돌아갑니다.'))return;await sb.from('momos_app_settings').delete().eq('key',key);alert('초기화되었습니다.');window._tabs['settings']();};
  window.toggleUserRole=async(id,cur)=>{if(!confirm('권한을 변경하시겠습니까?'))return;await sb.from('momos_users').update({role:cur==='admin'?'user':'admin'}).eq('id',id);window._tabs['settings']();};
  window.toggleUserActive=async(id,cur)=>{if(!confirm(cur?'비활성화하시겠습니까?':'활성화하시겠습니까?'))return;await sb.from('momos_users').update({is_active:!cur}).eq('id',id);window._tabs['settings']();};
  window.deleteUser=async(id,name)=>{if(window._user?.id===id)return alert('본인 계정은 삭제할 수 없습니다.');if(!confirm(`"${name}" 계정을 완전히 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`))return;const{error}=await sb.from('momos_users').delete().eq('id',id);if(error)return alert('삭제 실패: '+error.message);window._tabs['settings']();};
};
</script>
</body>
</html>
