<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOMOS COFFEE — 생두 관리 시스템</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#f5f5f3;
  --bg2:#ffffff;
  --bg3:#f0ede8;
  --border:#e0dbd4;
  --border2:#ccc7bf;
  --text:#1a1a18;
  --text2:#6b6860;
  --text3:#9b9890;
  --accent:#b8923a;
  --accent2:#96721e;
  --accent-bg:#fdf6e8;
  --danger:#c0392b;
  --danger-bg:#fdf0ee;
  --success:#27805a;
  --success-bg:#edf7f3;
  --warning:#b8730a;
  --warning-bg:#fef7ec;
  --sidebar-w:224px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 12px rgba(0,0,0,.10);
}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg3);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:var(--text3);}
*{scrollbar-width:thin;scrollbar-color:var(--border2) var(--bg3);}

/* 로그인 */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#f8f5f0 0%,#ede8e0 100%);}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:48px 44px;width:420px;box-shadow:var(--shadow-md);}
.login-logo{text-align:center;margin-bottom:32px;}
.login-logo .brand{font-size:20px;font-weight:700;color:var(--accent);letter-spacing:3px;}
.login-logo .sub{font-size:12px;color:var(--text2);margin-top:6px;letter-spacing:1px;}
.login-tabs{display:flex;margin-bottom:28px;border-bottom:2px solid var(--border);}
.login-tab{flex:1;padding:10px;text-align:center;cursor:pointer;font-size:13px;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;}
.login-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500;}
.form-group input,.form-group select,.inp,.sel{width:100%;padding:10px 14px;background:var(--bg2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none;transition:border .2s,box-shadow .2s;font-family:inherit;}
.form-group input:focus,.form-group select:focus,.inp:focus,.sel:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(184,146,58,.12);}
.form-group input.input-error,.inp.input-error{border-color:var(--danger);}
.btn-primary{width:100%;padding:12px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:background .2s,box-shadow .2s;font-family:inherit;box-shadow:0 2px 6px rgba(184,146,58,.3);}
.btn-primary:hover{background:var(--accent2);box-shadow:0 4px 12px rgba(184,146,58,.4);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
#login-msg{font-size:13px;text-align:center;margin-top:14px;min-height:20px;line-height:1.5;}
.msg-error{color:var(--danger);}.msg-success{color:var(--success);}.msg-info{color:var(--text2);}

/* 앱 */
#app-screen{display:none;min-height:100vh;}
.layout{display:flex;min-height:100vh;}

/* 사이드바 */
.sidebar{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;height:100vh;overflow-y:auto;z-index:100;box-shadow:1px 0 0 var(--border);}
.sidebar-header{padding:20px 18px 16px;border-bottom:1px solid var(--border);}
.sidebar-brand{font-size:13px;font-weight:700;color:var(--accent);letter-spacing:1.5px;}
.sidebar-user{font-size:11px;color:var(--text2);margin-top:4px;}
.sidebar-clock{font-size:11px;color:var(--text3);margin-top:6px;font-variant-numeric:tabular-nums;letter-spacing:.3px;}
.sidebar-clock .clock-date{color:var(--text2);font-weight:500;}
.sidebar-clock .clock-time{color:var(--accent);font-weight:700;font-size:13px;}
.sidebar-nav{flex:1;padding:8px 0;}
.nav-section{padding:14px 18px 4px;font-size:10px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;font-weight:600;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s;border-left:3px solid transparent;border-radius:0;}
.nav-item:hover{background:var(--accent-bg);color:var(--accent);}
.nav-item.active{background:var(--accent-bg);color:var(--accent);border-left-color:var(--accent);font-weight:600;}
.nav-icon{font-size:14px;width:18px;text-align:center;}
.nav-parent{display:flex;align-items:center;justify-content:space-between;padding:9px 18px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s;border-left:3px solid transparent;}
.nav-parent:hover{background:var(--accent-bg);color:var(--accent);}
.nav-parent.open{color:var(--text);background:var(--bg3);}
.nav-parent-left{display:flex;align-items:center;gap:10px;}
.nav-arrow{font-size:9px;transition:transform .2s;margin-right:2px;color:var(--text3);}
.nav-parent.open .nav-arrow{transform:rotate(90deg);}
.nav-children{display:none;background:var(--bg3);}
.nav-children.open{display:block;}
.nav-child{display:flex;align-items:center;gap:8px;padding:7px 18px 7px 46px;cursor:pointer;font-size:12px;color:var(--text2);transition:all .15s;border-left:3px solid transparent;}
.nav-child:hover{background:var(--accent-bg);color:var(--accent);}
.nav-child.active{color:var(--accent);font-weight:600;background:var(--accent-bg);border-left-color:var(--accent);}
.nav-child-dot{width:4px;height:4px;border-radius:50%;background:currentColor;flex-shrink:0;opacity:.5;}
.sidebar-footer{padding:12px 18px;border-top:1px solid var(--border);}
.btn-logout{width:100%;padding:8px;background:transparent;border:1.5px solid var(--border);border-radius:7px;color:var(--text2);font-size:12px;cursor:pointer;transition:all .2s;font-family:inherit;}
.btn-logout:hover{border-color:var(--danger);color:var(--danger);background:var(--danger-bg);}

/* 메인 */
.main{margin-left:var(--sidebar-w);flex:1;padding:28px 32px;min-height:100vh;background:var(--bg);}
.page-header{margin-bottom:24px;}
.page-title{font-size:22px;font-weight:700;color:var(--text);}
.page-sub{font-size:13px;color:var(--text2);margin-top:4px;}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px;}
.kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 22px;box-shadow:var(--shadow);}
.kpi-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
.kpi-value{font-size:28px;font-weight:700;margin:8px 0 3px;color:var(--text);}
.kpi-sub{font-size:12px;color:var(--text2);}
.kpi-card.danger{border-color:rgba(192,57,43,.2);background:var(--danger-bg);}
.kpi-card.danger .kpi-value{color:var(--danger);}
.kpi-card.warning{border-color:rgba(184,115,10,.2);background:var(--warning-bg);}
.kpi-card.warning .kpi-value{color:var(--warning);}
.kpi-card.success{border-color:rgba(39,128,90,.2);background:var(--success-bg);}
.kpi-card.success .kpi-value{color:var(--success);}
.kpi-card.accent{border-color:rgba(184,146,58,.2);background:var(--accent-bg);}
.kpi-card.accent .kpi-value{color:var(--accent);}

/* 카드 */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:22px;box-shadow:var(--shadow);}

/* 테이블 */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{padding:10px 14px;text-align:left;font-size:11px;color:var(--text2);border-bottom:2px solid var(--border);font-weight:700;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;background:var(--bg3);}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
tbody tr:hover{background:var(--accent-bg);}
tbody td{padding:10px 14px;color:var(--text);vertical-align:middle;}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.3px;}
.badge-danger{background:var(--danger-bg);color:var(--danger);border:1px solid rgba(192,57,43,.2);}
.badge-warning{background:var(--warning-bg);color:var(--warning);border:1px solid rgba(184,115,10,.2);}
.badge-success{background:var(--success-bg);color:var(--success);border:1px solid rgba(39,128,90,.2);}
.badge-accent{background:var(--accent-bg);color:var(--accent);border:1px solid rgba(184,146,58,.2);}
.badge-gray{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}

/* 버튼 */
.btn{padding:8px 16px;border-radius:7px;border:none;cursor:pointer;font-size:13px;transition:all .2s;font-family:inherit;font-weight:500;}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn-gold{background:var(--accent);color:#fff;font-weight:600;box-shadow:0 1px 4px rgba(184,146,58,.3);}
.btn-gold:hover{background:var(--accent2);box-shadow:0 2px 8px rgba(184,146,58,.4);}
.btn-outline{background:var(--bg2);border:1.5px solid var(--border);color:var(--text2);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg);}
.btn-danger-outline{background:var(--bg2);border:1.5px solid rgba(192,57,43,.3);color:var(--danger);}
.btn-danger-outline:hover{background:var(--danger-bg);}

/* 툴바 */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.search-input{padding:8px 14px;background:var(--bg2);border:1.5px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;outline:none;min-width:180px;font-family:inherit;transition:border .2s,box-shadow .2s;}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(184,146,58,.1);}
select.sel{padding:8px 14px;background:var(--bg2);border:1.5px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;outline:none;cursor:pointer;font-family:inherit;transition:border .2s;}
select.sel:focus{border-color:var(--accent);}

/* 알림 */
.alert{padding:12px 16px;border-radius:9px;font-size:13px;margin-bottom:16px;display:flex;align-items:center;gap:10px;font-weight:500;}
.alert-danger{background:var(--danger-bg);border:1px solid rgba(192,57,43,.25);color:var(--danger);}
.alert-warning{background:var(--warning-bg);border:1px solid rgba(184,115,10,.25);color:var(--warning);}
.alert-success{background:var(--success-bg);border:1px solid rgba(39,128,90,.25);color:var(--success);}
.alert-info{background:var(--accent-bg);border:1px solid rgba(184,146,58,.25);color:var(--accent);}

/* 모달 */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(2px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px;width:540px;max-width:95vw;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-md);}
.modal-title{font-size:17px;font-weight:700;margin-bottom:22px;color:var(--text);}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:24px;padding-top:16px;border-top:1px solid var(--border);}

/* 유틸 */
.loading{text-align:center;padding:60px;color:var(--text2);font-size:14px;}
.empty{text-align:center;padding:60px;color:var(--text2);font-size:14px;}
.flex-between{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.text-danger{color:var(--danger);}
.text-success{color:var(--success);}
.text-warning{color:var(--warning);}
.text-accent{color:var(--accent);}
.text-muted{color:var(--text2);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.chk-list{background:var(--bg3);border:1.5px solid var(--border);border-radius:8px;padding:10px;max-height:160px;overflow-y:auto;}
.chk-list label{display:flex;align-items:center;gap:8px;padding:5px 4px;cursor:pointer;font-size:13px;color:var(--text);border-radius:5px;transition:background .1s;}
.chk-list label:hover{background:var(--accent-bg);}
.chk-list input[type=checkbox]{accent-color:var(--accent);width:14px;height:14px;flex-shrink:0;}
.section-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px;}
.mini-feedback{font-size:12px;color:var(--success);padding:4px 0;min-height:20px;}
.sortable-ghost{opacity:.4;background:var(--accent-bg);}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="brand">MOMOS COFFEE</div>
      <div class="sub">생두 관리 시스템</div>
    </div>
    <div class="login-tabs">
      <div class="login-tab active" onclick="switchLoginTab('login')">로그인</div>
      <div class="login-tab" onclick="switchLoginTab('register')">계정 만들기</div>
      <div class="login-tab" onclick="switchLoginTab('reset')">비밀번호 변경</div>
    </div>
    <div id="tab-login">
      <div class="form-group"><label>아이디</label><input type="text" id="login-id" placeholder="아이디 입력"></div>
      <div class="form-group"><label>비밀번호</label><input type="password" id="login-pw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="btn-primary" id="btn-login" onclick="doLogin()">로그인</button>
    </div>
    <div id="tab-register" style="display:none">
      <div class="form-group"><label>마스터 코드</label><input type="password" id="reg-master" placeholder="마스터 코드 입력"></div>
      <div class="form-group"><label>아이디 (이름으로 사용)</label><input type="text" id="reg-id" placeholder="아이디 입력"></div>
      <div class="form-group"><label>비밀번호 (6자 이상)</label><input type="password" id="reg-pw" placeholder="비밀번호 입력"></div>
      <div class="form-group"><label>비밀번호 확인</label><input type="password" id="reg-pw2" placeholder="비밀번호 다시 입력" onkeydown="if(event.key==='Enter')doRegister()"></div>
      <button class="btn-primary" id="btn-register" onclick="doRegister()">계정 만들기</button>
    </div>
    <div id="tab-reset" style="display:none">
      <div class="form-group"><label>마스터 코드</label><input type="password" id="reset-master" placeholder="마스터 코드 입력"></div>
      <div class="form-group"><label>아이디</label><input type="text" id="reset-id" placeholder="아이디 입력"></div>
      <div class="form-group"><label>새 비밀번호</label><input type="password" id="reset-pw" placeholder="새 비밀번호 (6자 이상)"></div>
      <div class="form-group"><label>새 비밀번호 확인</label><input type="password" id="reset-pw2" placeholder="새 비밀번호 다시 입력" onkeydown="if(event.key==='Enter')doReset()"></div>
      <button class="btn-primary" id="btn-reset" onclick="doReset()">비밀번호 변경</button>
    </div>
    <div id="login-msg"></div>
  </div>
</div>

<!-- 앱 -->
<div id="app-screen">
  <div class="layout">
    <nav class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand">MOMOS COFFEE</div>
        <div class="sidebar-user" id="sidebar-user"></div>
        <div class="sidebar-clock"><span class="clock-date" id="clock-date"></span><br><span class="clock-time" id="clock-time"></span></div>
      </div>
      <div class="sidebar-nav">
        <div class="nav-section">메인</div>
        <div class="nav-item" data-tab="dashboard" onclick="loadTab('dashboard')"><span class="nav-icon">📊</span>대시보드</div>
        <div class="nav-section">기준 정보</div>
        <div class="nav-item" data-tab="master-bean" onclick="loadTab('master-bean')"><span class="nav-icon">🌱</span>생두 품목 마스터</div>
        <div class="nav-item" data-tab="master-roasted" onclick="loadTab('master-roasted')"><span class="nav-icon">☕</span>원두 품목 마스터</div>
        <div class="nav-item" data-tab="attributes" onclick="loadTab('attributes')"><span class="nav-icon">🏷️</span>속성 기준 관리</div>
        <div class="nav-item" data-tab="bom" onclick="loadTab('bom')"><span class="nav-icon">⚙️</span>원두 BOM 관리</div>
        <div class="nav-section">운영</div>
        <div class="nav-parent" id="nav-stock-parent" onclick="toggleNavParentStock()">
          <div class="nav-parent-left"><span class="nav-icon">📦</span>생두 보유현황</div>
          <span class="nav-arrow">▶</span>
        </div>
        <div class="nav-children" id="nav-stock-children">
          <div class="nav-child" data-tab="stock-all" onclick="loadTab('stock-all')"><span class="nav-child-dot"></span>전체</div>
          <div class="nav-child" data-tab="stock-prod" onclick="loadTab('stock-prod')"><span class="nav-child-dot"></span>생산용</div>
          <div class="nav-child" data-tab="stock-sale" onclick="loadTab('stock-sale')"><span class="nav-child-dot"></span>판매용</div>
        </div>
        <div class="nav-parent" id="nav-consumption-parent" onclick="toggleNavParentConsumption()">
          <div class="nav-parent-left"><span class="nav-icon">🔥</span>생두 소모 관리</div>
          <span class="nav-arrow">▶</span>
        </div>
        <div class="nav-children" id="nav-consumption-children">
          <div class="nav-child" data-tab="consumption-all" onclick="loadTab('consumption-all')"><span class="nav-child-dot"></span>전체</div>
          <div class="nav-child" data-tab="consumption-prod" onclick="loadTab('consumption-prod')"><span class="nav-child-dot"></span>생산소모</div>
          <div class="nav-child" data-tab="consumption-sale" onclick="loadTab('consumption-sale')"><span class="nav-child-dot"></span>판매소모</div>
        </div>
        <div class="nav-item" data-tab="production" onclick="loadTab('production')"><span class="nav-icon">🏭</span>원두 생산 관리</div>
        <div class="nav-item" data-tab="roasted-usage" onclick="loadTab('roasted-usage')"><span class="nav-icon">🚚</span>원두 사용 이력</div>
        <div class="nav-item" data-tab="purchase" onclick="loadTab('purchase')"><span class="nav-icon">🛒</span>구매 이력 분석</div>
        <div class="nav-item" data-tab="arrival" onclick="loadTab('arrival')"><span class="nav-icon">🚢</span>생두 입항 예정</div>
        <div class="nav-section">분석</div>
        <div class="nav-item" data-tab="dday" onclick="loadTab('dday')"><span class="nav-icon">⏰</span>D-day / 안전재고</div>
        <div class="nav-item" data-tab="product-stock" onclick="loadTab('product-stock')"><span class="nav-icon">☕</span>원두별 생두 현황</div>
        <div class="nav-item" data-tab="transfer" onclick="loadTab('transfer')"><span class="nav-icon">🔄</span>전환 추천</div>
        <div class="nav-item" data-tab="buyplan" onclick="loadTab('buyplan')"><span class="nav-icon">📈</span>구매 필요 분석</div>
        <div class="nav-item" data-tab="slowstock" onclick="loadTab('slowstock')"><span class="nav-icon">🚨</span>저회전·장기재고</div>
        <div class="nav-section">시스템</div>
        <div class="nav-item" data-tab="calendar" onclick="loadTab('calendar')"><span class="nav-icon">📅</span>캘린더</div>
        <div class="nav-item" data-tab="logs" onclick="loadTab('logs')"><span class="nav-icon">📋</span>활동 로그</div>
        <div class="nav-item" data-tab="settings" onclick="loadTab('settings')"><span class="nav-icon">⚙️</span>설정</div>
      </div>
      <div class="sidebar-footer">
        <button class="btn-logout" onclick="doLogout()">로그아웃</button>
      </div>
    </nav>
    <main class="main" id="main-content"><div class="loading">로딩 중...</div></main>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
// SheetJS (엑셀 처리)
const XLSX_CDN='https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js';
function loadXLSX(){return new Promise(res=>{if(window.XLSX){res(window.XLSX);return;}const s=document.createElement('script');s.src=XLSX_CDN;s.onload=()=>res(window.XLSX);document.head.appendChild(s);});}

// ── 엑셀 공통 유틸
window.excelDownload=async(data,cols,filename)=>{
  const X=await loadXLSX();
  const ws=X.utils.json_to_sheet(data,{header:cols.map(c=>c.key)});
  ws['!cols']=cols.map(c=>({wch:c.w||15}));
  // 한글 헤더 적용
  const range=X.utils.decode_range(ws['!ref']||'A1');
  cols.forEach((c,i)=>{const cell=X.utils.encode_cell({r:0,c:i});ws[cell]={v:c.label,t:'s'};});
  const wb=X.utils.book_new();X.utils.book_append_sheet(wb,ws,'데이터');
  X.writeFile(wb,filename);
};
window.excelTemplateDownload=async(cols,filename)=>{
  const X=await loadXLSX();
  const exampleRow=cols.map(c=>c.example!=null&&c.example!==''?`예시) ${c.example}`:'');
  const ws=X.utils.aoa_to_sheet([cols.map(c=>c.label),exampleRow]);
  ws['!cols']=cols.map(c=>({wch:c.w||15}));
  const wb=X.utils.book_new();X.utils.book_append_sheet(wb,ws,'양식');
  X.writeFile(wb,filename);
};
window.excelUpload=(file,cols)=>{
  return new Promise(async(res,rej)=>{
    const X=await loadXLSX();
    const buf=await file.arrayBuffer();
    const wb=X.read(buf,{type:'array',cellDates:true});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rawRows=X.utils.sheet_to_json(ws,{header:1,raw:false,dateNF:'yyyy-mm-dd'});
    if(rawRows.length<2)return rej('데이터가 없습니다.');
    const header=rawRows[0].map(h=>String(h||'').trim());
    // 유연 매핑: label 정확일치 → label 정규화 일치(소문자+공백제거) → aliases 일치
    const normalize=s=>String(s||'').toLowerCase().replace(/[\s\-_()（）\/]/g,'');
    const keyMap={};
    cols.forEach(c=>{
      const aliases=[c.label,...(c.aliases||[])];
      let found=-1;
      // 1) 정확 일치
      found=header.indexOf(aliases.find(a=>header.includes(a))||'__none__');
      // 2) 정규화 일치
      if(found<0){
        const normAliases=aliases.map(normalize);
        found=header.findIndex(h=>normAliases.includes(normalize(h)));
      }
      if(found>=0)keyMap[found]=c.key;
    });
    const rows=rawRows.slice(1).filter(r=>r.some(v=>v!=null&&v!=='')).map(r=>{const obj={};Object.entries(keyMap).forEach(([i,k])=>{obj[k]=r[i]??'';});return obj;});
    res(rows);
  });
};

window.doLogin=async()=>{
  const user=inp('login-id'),pw=el('login-pw').value;
  if(!user||!pw)return setMsg('아이디와 비밀번호를 입력하세요.');
  setBtnLoading('btn-login',true,'로그인');setMsg('로그인 중...','info');
  const hash=await sha256(pw);
  const{data,error}=await sb.from('momos_users').select('*').eq('username',user).eq('password_hash',hash).maybeSingle();
  setBtnLoading('btn-login',false,'로그인');
  if(error||!data)return setMsg('아이디 또는 비밀번호가 올바르지 않습니다.');
  if(!data.is_active)return setMsg('비활성화된 계정입니다. 관리자에게 문의하세요.');
  await sb.from('momos_users').update({last_login_at:new Date().toISOString()}).eq('id',data.id);
  const u={id:data.id,username:data.username,role:data.role};
  saveSession(u);window._user=u;
  // 로그인 로그
  setTimeout(()=>window.logActivity?.('login','momos_users','success'),500);
  afterLogin(u);
};

  if(pw.length<6)return setMsg('비밀번호는 6자 이상이어야 합니다.');

function startClock(){
  function tick(){
    const now=new Date();
    const kst=new Date(now.toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
    const yy=kst.getFullYear(),mm=String(kst.getMonth()+1).padStart(2,'0'),dd=String(kst.getDate()).padStart(2,'0');
    const days=['일','월','화','수','목','금','토'];
    const dow=days[kst.getDay()];
    const hh=String(kst.getHours()).padStart(2,'0'),mi=String(kst.getMinutes()).padStart(2,'0'),ss=String(kst.getSeconds()).padStart(2,'0');
    const cd=el('clock-date');const ct=el('clock-time');
    if(cd)cd.textContent=`${yy}.${mm}.${dd} (${dow})`;
    if(ct)ct.textContent=`${hh}:${mi}:${ss}`;
  }
  tick();setInterval(tick,1000);
}

  const today=window.getKSTToday();

    const t=window.getKSTToday();
    if(mode==='day')return s.dayVal||t;
    if(mode==='month')return s.monthVal?`${s.monthVal}-01 ~ ${s.monthVal}-31`:`${t.slice(0,7)}-01 ~ ${t}`;
    if(mode==='year')return s.yearVal?`${s.yearVal}-01-01 ~ ${s.yearVal}-12-31`:`${t.slice(0,4)}-01-01 ~ ${t}`;

      <input type="date" class="inp" style="padding:4px 8px;font-size:12px;width:130px" value="${s.to||today}"

window.setDateFilter=(tabKey,mode,callbackStr)=>{
  if(!window._dateFilterState[tabKey])window._dateFilterState[tabKey]={};
  window._dateFilterState[tabKey].mode=mode;
  if(callbackStr)eval(callbackStr+'()');
};
window.applyDateFilter=(rows,dateKey,tabKey)=>{
  const s=window._dateFilterState[tabKey]||{mode:'all'};
  const today=window.getKSTToday();
  if(s.mode==='all')return rows;
  if(s.mode==='day'){const d=s.dayVal||today;return rows.filter(r=>r[dateKey]===d);}
  if(s.mode==='month'){const m=s.monthVal||today.slice(0,7);return rows.filter(r=>(r[dateKey]||'').startsWith(m));}
  if(s.mode==='year'){const y=s.yearVal||String(new Date().getFullYear());return rows.filter(r=>(r[dateKey]||'').startsWith(y));}
  if(s.mode==='range'){const{from='',to=today}=s;return rows.filter(r=>(!from||r[dateKey]>=from)&&(!to||r[dateKey]<=to));}
  return rows;
};

window.parseUploadDate=(v)=>{
  if(!v)return null;
  const s=String(v).trim();
  // YYYY/MM/DD 또는 YYYY-MM-DD 앞부분만 추출
  const m=s.match(/^(\d{4})[\-\/](\d{1,2})[\-\/](\d{1,2})/);
  if(m)return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  return null;
};

};

    <div class="kpi-card accent"><div class="kpi-label">원두 품목 수</div><div class="kpi-value">${roastCnt}</div><div class="kpi-sub">활성 원두</div></div>
    <div class="kpi-card"><div class="kpi-label">최근 생산일</div><div class="kpi-value" style="font-size:18px">${lastProd}</div><div class="kpi-sub">원두 생산 기록</div></div>
    <div class="kpi-card ${diff>=5?'danger':diff>=2?'warning':'success'}"><div class="kpi-label">보유현황 갱신</div><div class="kpi-value" style="font-size:18px">${diff===999?'미등록':diff+'일 전'}</div><div class="kpi-sub">기준일 ${latestDate||'-'}</div></div>
  </div>
  <div class="card" style="margin-bottom:20px">
    <div class="flex-between"><div style="font-size:14px;font-weight:700">빠른 메뉴</div></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-top:14px;">
      ${[['📦','생두 보유현황','stock-all'],['🏭','원두 생산 관리','production'],['⏰','D-day / 안전재고','dday'],['🌱','생두 품목 마스터','master-bean'],['☕','원두 품목 마스터','master-roasted'],['⚙️','원두 BOM 관리','bom']].map(([icon,label,tab])=>`<div onclick="loadTab('${tab}')" style="background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;text-align:center;transition:all .2s;" onmouseover="this.style.borderColor='var(--accent)';this.style.background='var(--accent-bg)'" onmouseout="this.style.borderColor='var(--border)';this.style.background='var(--bg3)'"><div style="font-size:22px;margin-bottom:8px">${icon}</div><div style="font-size:12px;color:var(--text2);font-weight:500">${label}</div></div>`).join('')}
    </div>
  </div>
  <div class="card" style="margin-bottom:20px">
    <div class="flex-between" style="margin-bottom:12px">
      <div style="font-size:14px;font-weight:700">📅 주간 현황 <span style="font-size:12px;color:var(--text2);font-weight:400">— 오늘 기준 ±3일</span></div>
      <button class="btn btn-sm btn-outline" onclick="loadTab('calendar')">전체 캘린더 →</button>
    </div>
    <div id="dash-mini-cal" style="display:grid;grid-template-columns:repeat(7,1fr);gap:8px">
      <div class="loading" style="grid-column:1/-1;padding:20px">로딩 중...</div>
    </div>
  </div>
  <div class="card">
    <div class="flex-between" style="margin-bottom:16px">
      <div style="font-size:14px;font-weight:700">원산지별 재고 현황</div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm btn-outline" id="df-prod" onclick="setDashFilter('생산용')">생산용</button>
        <button class="btn btn-sm btn-outline" id="df-sale" onclick="setDashFilter('판매용')">판매용</button>
        <button class="btn btn-sm btn-gold" id="df-all" onclick="setDashFilter('전체')">전체</button>
      </div>
    </div>
    <div id="dash-origin-table"><div class="loading" style="padding:20px">로딩 중...</div></div>
  </div>`;
  // ── 대시보드 미니 캘린더 (오늘 기준 -3 ~ +3일)
  const kstNow=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
  const todayKST=`${kstNow.getFullYear()}-${String(kstNow.getMonth()+1).padStart(2,'0')}-${String(kstNow.getDate()).padStart(2,'0')}`;
  // 7일 날짜 배열
  const miniDays=[];
  for(let i=-3;i<=3;i++){const d=new Date(kstNow);d.setDate(d.getDate()+i);miniDays.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);}
  const miniStart=miniDays[0],miniEnd=miniDays[miniDays.length-1];
  // 공휴일 (캘린더 탭과 동일 로직)
  function getMiniHolidays(y){
    const h={};
    const add=(m,d,name)=>{h[`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`]=name;};
    add(1,1,'신정');add(3,1,'삼일절');add(5,5,'어린이날');add(6,6,'현충일');
    add(8,15,'광복절');add(10,3,'개천절');add(10,9,'한글날');add(12,25,'성탄절');
    const lunar={2024:{설날:[[2,9],[2,10],[2,11]],추석:[[9,16],[9,17],[9,18]],부처님오신날:[[5,15]]},2025:{설날:[[1,28],[1,29],[1,30]],추석:[[10,5],[10,6],[10,7]],부처님오신날:[[5,5]]},2026:{설날:[[2,17],[2,18],[2,19]],추석:[[9,24],[9,25],[9,26]],부처님오신날:[[5,24]]},2027:{설날:[[2,6],[2,7],[2,8]],추석:[[9,14],[9,15],[9,16]],부처님오신날:[[5,13]]}};
    if(lunar[y])Object.entries(lunar[y]).forEach(([name,dates])=>dates.forEach(([m,d])=>add(m,d,name)));
    return h;
  }
  const years=[...new Set(miniDays.map(d=>parseInt(d.slice(0,4))))];
  const miniHolidays={};years.forEach(y=>Object.assign(miniHolidays,getMiniHolidays(y)));
  // 7일 데이터 로드
  const[{data:miniProd},{data:miniCon},{data:miniRu}]=await Promise.all([
    sb.from('momos_production_records').select('production_date').gte('production_date',miniStart).lte('production_date',miniEnd),
    sb.from('momos_green_bean_consumption').select('consume_date,consume_type').gte('consume_date',miniStart).lte('consume_date',miniEnd),
    sb.from('momos_roasted_transfers').select('transfer_date').gte('transfer_date',miniStart).lte('transfer_date',miniEnd),
  ]);
  const miniEvMap={};
  const addMini=(date,type)=>{if(!date)return;if(!miniEvMap[date])miniEvMap[date]=new Set();miniEvMap[date].add(type);};
  (miniProd||[]).forEach(r=>addMini(r.production_date,'prod'));
  (miniCon||[]).forEach(r=>addMini(r.consume_date,r.consume_type==='생산소모'?'prod-con':'sale-con'));
  (miniRu||[]).forEach(r=>addMini(r.transfer_date,'transfer'));
  const CAL_ITEMS_MINI=[{type:'prod',label:'원두생산'},{type:'prod-con',label:'생산소모'},{type:'sale-con',label:'판매소모'},{type:'transfer',label:'원두이동'}];
  const miniCells=miniDays.map(dateStr=>{
    const dow=new Date(dateStr).getDay();
    const isSun=dow===0,isSat=dow===6;
    const isToday=dateStr===todayKST;
    const isWeekend=isSun||isSat;
    const holiday=miniHolidays[dateStr];
    const evTypes=miniEvMap[dateStr]||new Set();
    const d=parseInt(dateStr.slice(8));
    const m=parseInt(dateStr.slice(5,7));
    const bgCell=isSun?'background:rgba(239,68,68,0.07);border-color:rgba(239,68,68,0.25)':isSat?'background:rgba(59,130,246,0.07);border-color:rgba(59,130,246,0.25)':'background:var(--bg2);border-color:var(--border)';
    const dateColor=holiday||isSun?'color:var(--danger)':isSat?'color:#3b82f6':isToday?'color:var(--accent)':'color:var(--text1)';
    const itemsHtml=CAL_ITEMS_MINI.map(item=>{
      const has=evTypes.has(item.type);
      return `<div style="font-size:10px;border-radius:3px;padding:1px 5px;margin-bottom:2px;${has?'background:#bbf7d0;color:#065f46;font-weight:700':'background:#ffe4e6;color:#9f1239;font-weight:400'}">${has?'✓':'✕'} ${item.label}</div>`;
    }).join('');
    return `<div style="border:${isToday?'2px solid var(--accent)':'1.5px solid'};${bgCell};border-radius:10px;padding:8px 10px;min-width:0;${isToday?'box-shadow:0 0 0 3px var(--accent-bg)':''}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div>
          <span style="font-size:16px;font-weight:${isToday?'900':'700'};${dateColor}">${d}</span>
          <span style="font-size:10px;color:var(--text3);margin-left:3px">${m}월</span>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:1px">
          <span style="font-size:10px;font-weight:600;${dateColor}">${['일','월','화','수','목','금','토'][dow]}</span>
          ${holiday?`<span style="font-size:9px;color:var(--danger);font-weight:600">${holiday}</span>`:''}
          ${isToday?`<span style="font-size:9px;background:var(--accent);color:#fff;border-radius:3px;padding:0 3px;font-weight:700">오늘</span>`:''}
        </div>
      </div>
      ${itemsHtml}
    </div>`;
  }).join('');
  el('dash-mini-cal').innerHTML=miniCells;

  // [FIX] 전체 조회 → 최신 base_date 먼저 확인 후 해당 날짜만 DB 레벨 필터
  const{data:_latestDateRow}=await sb.from('momos_green_bean_stock').select('base_date').eq('is_active',true).order('base_date',{ascending:false}).limit(1).maybeSingle();
  const maxDate=_latestDateRow?.base_date||'';
  const oMap={};
  if(maxDate){
    const{data:stockLatest}=await sb.from('momos_green_bean_stock').select('origin,stock_type,quantity_kg,restrict_type').eq('base_date',maxDate).eq('is_active',true);
    // [FIX] restrict_type='사용안함' 제외 — renderStock과 동일 기준
    (stockLatest||[]).forEach(r=>{
      if(r.restrict_type==='사용안함')return;
      if(!oMap[r.origin])oMap[r.origin]={total:0,prod:0,sale:0};
      const kg=parseFloat(r.quantity_kg||0);
      oMap[r.origin].total+=kg;
      if(r.stock_type==='생산용')oMap[r.origin].prod+=kg;
      if(r.stock_type==='판매용')oMap[r.origin].sale+=kg;
    });
  }
  window._dashOriginMap=oMap;window._dashFilter=window._dashFilter||'전체';
  window.setDashFilter=(f)=>{window._dashFilter=f;renderDashOrigin();['prod','sale','all'].forEach(k=>{const b=el('df-'+k);if(b)b.className='btn btn-sm '+({생산용:'prod',판매용:'sale',전체:'all'}[f]===k?'btn-gold':'btn-outline');});};
  function renderDashOrigin(){
    const f=window._dashFilter,oM=window._dashOriginMap||{};
    const entries=Object.entries(oM).sort((a,b)=>b[1].total-a[1].total);

    const grand=entries.reduce((s,[,v])=>s+(f==='생산용'?v.prod:f==='판매용'?v.sale:v.total),0);

      ?`${codes.length}개 품목을 특정제품전용으로 설정하고 허용 원두 ${allowedCodes.length}개를 지정하시겠습니까?`

      await sb.from('momos_item_allowed_products').delete().eq('item_code',itemCode);
      if(restrict==='특정제품전용'&&allowedCodes.length){
        await sb.from('momos_item_allowed_products').insert(allowedCodes.map(pc=>({item_code:itemCode,product_code:pc})));

          }
          const isSpec=restrict==='특정제품전용';
          const label=restrict+(isSpec?' ▾':'');
          const spanId='brs-'+itemCode;
          restrictCell.innerHTML='<span id="'+spanId+'" class="badge '+rBadgeCls+'" style="white-space:nowrap;cursor:'+(isSpec?'pointer':'default')+'">'+label+'</span>'+dropHtml;
          if(isSpec){const sp=document.getElementById(spanId);if(sp)sp.addEventListener('click',function(e){toggleAllowedDrop(e,''+itemCode+'');});}
          row.dataset.allows=restrict==='특정제품전용'?allowedCodes.join(' '):'';

        const editBtn=row.querySelector('button[data-code]');

  window.beanExcelUpload=async(input)=>{
    const f=input.files?.[0];if(!f)return;input.value='';
    let rows;try{rows=await excelUpload(f,BEAN_COLS);}catch(e){return alert('업로드 오류: '+e);}
    if(!rows.length)return alert('업로드할 데이터가 없습니다.');
    // 첫 행으로 매핑 확인 (item_code, origin 둘 다 없으면 컬럼 인식 실패)
    const firstRow=rows[0]||{};
    if(!firstRow.item_code&&!firstRow.origin){
      return alert('⚠ 엑셀 컬럼 헤더를 인식하지 못했습니다.\n\n양식 버튼으로 다운받은 양식을 사용하거나,\n헤더행이 첫 번째 행인지 확인해주세요.\n\n인식 가능한 헤더명:\n· 품목코드 (또는 item_code, 품번)\n· 원산지 (또는 origin, country)\n· 가공방식 (또는 processing)');
    }
    // arrival_date 정규화: 202506 → 2025-06 / 2025-06-01 → 2025-06
    const normalizeYM=(v)=>{
      if(!v)return null;
      const s=String(v).trim().replace(/[./]/g,'-');
      if(/^\d{6}$/.test(s))return s.slice(0,4)+'-'+s.slice(4,6);
      if(/^\d{4}-\d{2}/.test(s))return s.slice(0,7);
      return null;
    };
    rows.forEach(r=>{r.arrival_date=normalizeYM(r.arrival_date);});
    // 속성 기준 강제 로드 (캐시 무시)
    await window.loadAttrCache(true);
    const validOrigins=new Set(window._attrCache?.['origin']||[]);
    const validProcessings=new Set(window._attrCache?.['processing']||[]);
    // 불일치 사전 확인
    const attrMismatch=rows.filter(r=>r.item_code&&r.origin&&r.processing&&(!validOrigins.has(r.origin)||!validProcessings.has(r.processing)));
    if(attrMismatch.length){
      const unmatchedOrigins=[...new Set(attrMismatch.filter(r=>!validOrigins.has(r.origin)).map(r=>r.origin))];
      const unmatchedProcessings=[...new Set(attrMismatch.filter(r=>!validProcessings.has(r.processing)).map(r=>r.processing))];
      const warnLines=[];
      if(unmatchedOrigins.length)warnLines.push(`미등록 원산지: ${unmatchedOrigins.join(', ')}`);
      if(unmatchedProcessings.length)warnLines.push(`미등록 가공방식: ${unmatchedProcessings.join(', ')}`);
      // 불일치 품목코드 목록 (최대 10개)
      const mismatchCodes=attrMismatch.map(r=>r.item_code).filter(Boolean);
      const codesPreview=mismatchCodes.slice(0,10).join(', ')+(mismatchCodes.length>10?` 외 ${mismatchCodes.length-10}건`:'');
      if(codesPreview)warnLines.push(`\n해당 품목코드: ${codesPreview}`);
      if(!confirm(`⚠ 속성 기준 불일치 ${attrMismatch.length}건이 있습니다.\n${warnLines.join('\n')}\n\n해당 행은 건너뛰고 나머지를 업로드하시겠습니까?`))return;
    }
    const hasArrival=rows.some(r=>r.arrival_date);
    if(!confirm(`총 ${rows.length}건을 업로드하시겠습니까?\n(중복 품목코드·속성 기준 불일치 행은 건너뜁니다)`))return;
    let ok=0,skip=0,attrSkip=[];
    const uploadRows=rows.filter(r=>r.item_code&&r.item_name&&r.origin&&r.processing);
    // 매핑 실패 감지: 필수 필드 없는 행 수 확인
    const mappingFailed=rows.filter(r=>!r.item_code&&!r.origin);
    if(mappingFailed.length>rows.length*0.5){
      hideUploadOverlay();
      const sample=rows[0]||{};
      const foundKeys=Object.keys(sample).filter(k=>sample[k]);
      return alert(`⚠ 컬럼 매핑 실패: ${mappingFailed.length}건의 행에서 품목코드/원산지를 인식하지 못했습니다.\n\n인식된 컬럼: ${foundKeys.join(', ')||'없음'}\n\n양식 버튼으로 다운받은 양식을 사용하거나, 엑셀 헤더가 첫 번째 행인지 확인하세요.`);
    }
    if(uploadRows.length===0){
      hideUploadOverlay();
      return alert(`⚠ 업로드 가능한 행이 없습니다.\n\n전체 ${rows.length}건 중 필수값(품목코드·품목명·원산지·가공방식)이 모두 있는 행이 없습니다.\n\n첫 번째 행 샘플:\n${JSON.stringify(rows[0]||{},null,2).slice(0,300)}`);
    }

    let processed=0;
    for(const r of uploadRows){
      // 속성 기준 체크 — 불일치 행은 건너뜀
      const errs=[];
      if(!validOrigins.has(r.origin))errs.push(`원산지 "${r.origin}"`);
      if(!validProcessings.has(r.processing))errs.push(`가공방식 "${r.processing}"`);
      if(errs.length){attrSkip.push(`${r.item_code}(${errs.join(', ')} 미등록)`);processed++;showUploadOverlay(processed,uploadRows.length);continue;}
      const{data:exist}=await sb.from('momos_green_bean_items').select('item_code').eq('item_code',r.item_code).maybeSingle();
      if(exist){skip++;processed++;showUploadOverlay(processed,uploadRows.length);continue;}
      const{error}=await sb.from('momos_green_bean_items').insert({item_code:r.item_code,item_name:r.item_name,origin:r.origin,variety:r.variety,processing:r.processing,grade:r.grade,unit_price_kg:parseFloat(String(r.unit_price_kg||'').replace(/,/g,''))||null,arrival_date:r.arrival_date||null,restrict_type:r.restrict_type||'공용',note:r.note||null,is_active:true});
      if(!error)ok++;
      processed++;showUploadOverlay(processed,uploadRows.length);
    }

    const resultMsg=[`업로드 완료!\n등록 ${ok}건 / 중복 건너뜀 ${skip}건`];

    alert(resultMsg.join('\n'));window._tabs['master-bean']();
  };

    const code=el('bem-code').value,name=inp('bem-name'),origin=el('bem-origin').value,variety=el('bem-variety').value,processing=el('bem-processing').value,grade=el('bem-grade').value;
    const rawPrice=String(el('bem-unitprice').value||'').replace(/,/g,'');
    const price=parseFloat(rawPrice)||null;
    const arrival_date=el('bem-arrival').value||null,restrict=el('bem-restrict').value,note=inp('bem-note');
    if(!name||!origin||!processing)return alert('품목명, 원산지, 가공방식은 필수입니다.');
    if(restrict==='특정제품전용'&&!getBemAllowedCodes().length)return alert('허용 원두를 최소 1개 이상 선택하세요.');
    const{error}=await sb.from('momos_green_bean_items').update({item_name:name,origin,variety,processing,grade,unit_price_kg:price,arrival_date,restrict_type:restrict,note:note||null}).eq('item_code',code);
    if(error)return alert('수정 실패: '+error.message);
    // 허용 원두 갱신 (삭제 후 재등록)
    await sb.from('momos_item_allowed_products').delete().eq('item_code',code);
    if(restrict==='특정제품전용'){const codes=getBemAllowedCodes();if(codes.length)await sb.from('momos_item_allowed_products').insert(codes.map(pc=>({item_code:code,product_code:pc})));}
    // 모달 닫고 해당 행만 DOM 업데이트
    closeModal('bean-edit-modal');
    const row=document.querySelector(`#bean-tbody tr[data-code="${code}"]`);
    if(row){
      row.cells[1].textContent=arrival_date||'-';
      row.cells[2].textContent=origin;
      row.cells[4].textContent=name;
      row.cells[5].textContent=variety||'-';
      row.cells[6].textContent=processing;
      row.cells[7].textContent=grade||'-';
      row.cells[8].textContent=price?parseFloat(price).toLocaleString()+' 원':'-';
      // 투입구분 셀 전체 재렌더링 (배지 + 드롭다운 즉시 반영)
      const restrictCell=row.querySelector('td:nth-child(10)');
      if(restrictCell){
        const rBadgeCls=restrict==='특정제품전용'?'badge-warning':restrict==='사용안함'?'badge-danger':'badge-gray';
        // 저장된 허용 원두 목록 새로 조회해서 드롭다운 내용 생성
        const {data:freshAllowed}=await sb.from('momos_item_allowed_products')
          .select('product_code').eq('item_code',code);
        const allowedCodes=(freshAllowed||[]).map(r=>r.product_code);
        // 허용 원두 이름 조회 (products 캐시 활용)
        const {data:prodNames}=await sb.from('momos_roasted_products')
          .select('product_code,product_name').in('product_code',allowedCodes.length?allowedCodes:['_']);
        const prodNameMap={};(prodNames||[]).forEach(r=>prodNameMap[r.product_code]=r.product_name);
        const dropContent=allowedCodes.length
          ?allowedCodes.map(pc=>`<div style="padding:5px 14px;font-size:12px;color:var(--text)"><strong style="color:var(--accent)">${pc}</strong> ${prodNameMap[pc]||''}</div>`).join('')
          :'<div style="padding:5px 14px;font-size:12px;color:var(--text3)">지정된 원두 없음</div>';
        restrictCell.innerHTML=`
          <span class="badge ${rBadgeCls}" style="white-space:nowrap;cursor:${restrict==='특정제품전용'?'pointer':'default'}"
            onclick="${restrict==='특정제품전용'?`toggleAllowedDrop(event,'${code}')`:''}"
          >${restrict}${restrict==='특정제품전용'?' ▾':''}</span>
          <div id="adrop-${code}" style="display:none;position:fixed;z-index:9999;background:var(--bg2);border:1.5px solid var(--border);border-radius:8px;box-shadow:var(--shadow-md);min-width:200px;padding:8px 0">
            ${dropContent}
          </div>`;
        // data-allows 속성도 갱신 (검색 필터용)
        row.dataset.allows=allowedCodes.join(' ');
      }
      row.dataset.restrict=restrict;row.dataset.name=name;row.dataset.origin=origin;
      // 수정 버튼 data 속성도 최신값으로 갱신
      const editBtn=row.querySelector('button[data-code]');
      if(editBtn){editBtn.dataset.name=name;editBtn.dataset.origin=origin;editBtn.dataset.variety=variety||'';editBtn.dataset.processing=processing;editBtn.dataset.grade=grade||'';editBtn.dataset.price=price||'';editBtn.dataset.arrival=arrival_date||'';editBtn.dataset.restrict=restrict;editBtn.dataset.note=note||'';}
    } else {
      const scrollY=window.scrollY||document.documentElement.scrollTop;
      await window._tabs['master-bean']();
      requestAnimationFrame(()=>window.scrollTo({top:scrollY,behavior:'instant'}));
    }
  };
  window.deleteBeanItem=async(code)=>{
    if(!confirm(`"${code}" 품목을 삭제하시겠습니까?\n연결된 보유현황·BOM·소모 이력이 있으면 삭제가 안될 수 있습니다.`))return;
    const{error}=await sb.from('momos_green_bean_items').delete().eq('item_code',code);
    if(error)return alert('삭제 실패: '+error.message);
    const row=document.querySelector(`#bean-tbody tr[data-code="${code}"]`);
    if(row)row.remove(); else {const scrollY=window.scrollY||document.documentElement.scrollTop;await window._tabs['master-bean']();requestAnimationFrame(()=>window.scrollTo({top:scrollY,behavior:'instant'}));}
  };
  window.toggleBeanActive=async(code,cur)=>{
    if(!confirm(cur?'비활성화하시겠습니까?':'활성화하시겠습니까?'))return;
    const{error}=await sb.from('momos_green_bean_items').update({is_active:!cur}).eq('item_code',code);
    if(error)return alert('변경 실패: '+error.message);
    const row=document.querySelector(`#bean-tbody tr[data-code="${code}"]`);
    if(row){
      const newVal=!cur;
      row.dataset.active=String(newVal);
      const badge=row.querySelector('td:nth-child(11) .badge');
      if(badge){badge.textContent=newVal?'사용중':'사용안함';badge.className='badge '+(newVal?'badge-success':'badge-gray');}
      const btn=row.querySelector(`button[onclick*="toggleBeanActive"]`);
      if(btn){btn.textContent=newVal?'비활성':'활성';btn.className='btn btn-sm '+(newVal?'btn-danger-outline':'btn-outline');btn.setAttribute('onclick',`toggleBeanActive('${code}',${newVal})`);}
    } else {const scrollY=window.scrollY||document.documentElement.scrollTop;await window._tabs['master-bean']();requestAnimationFrame(()=>window.scrollTo({top:scrollY,behavior:'instant'}));}
  };
  window.saveBeanItem=async()=>{
    const code=inp('bm-code'),name=inp('bm-name'),origin=el('bm-origin').value,variety=el('bm-variety').value,processing=el('bm-processing').value,grade=el('bm-grade').value,restrict=el('bm-restrict').value,note=inp('bm-note'),unit_price_kg=parseFloat(String(el('bm-unitprice').value||'').replace(/,/g,''))||null,arrival_date=el('bm-arrival').value||null;
    if(!code||!name||!origin||!processing)return alert('필수 항목(*)을 모두 입력하세요.');
    // 속성 기준 검증 (캐시 강제 갱신)
    await window.loadAttrCache(true);
    const validOrigins=window._attrCache?.['origin']||[];
    const validProcessings=window._attrCache?.['processing']||[];
    if(!validOrigins.includes(origin))return alert(`원산지 "${origin}"이 속성 기준에 없습니다.\n속성 기준 관리에서 먼저 등록해주세요.`);
    if(!validProcessings.includes(processing))return alert(`가공방식 "${processing}"이 속성 기준에 없습니다.\n속성 기준 관리에서 먼저 등록해주세요.`);
    if(restrict==='특정제품전용'&&!getBmAllowedCodes().length)return alert('허용 원두를 최소 1개 이상 선택하세요.');
    const{data:exist}=await sb.from('momos_green_bean_items').select('item_code').eq('item_code',code).maybeSingle();
    if(exist)return alert('이미 등록된 품목코드입니다.');
    const{error}=await sb.from('momos_green_bean_items').insert({item_code:code,item_name:name,origin,variety,processing,grade,restrict_type:restrict,unit_price_kg,arrival_date,note:note||null});
    if(error)return alert('저장 실패: '+error.message);
    if(restrict==='특정제품전용'){const codes=getBmAllowedCodes();if(codes.length)await sb.from('momos_item_allowed_products').insert(codes.map(pc=>({item_code:code,product_code:pc})));}
    const scrollY=window.scrollY||document.documentElement.scrollTop;
    closeBeanModal();
    await window._tabs['master-bean']();
    requestAnimationFrame(()=>window.scrollTo({top:scrollY,behavior:'instant'}));
  };
};

  function renderPtypeRows(rows){

  }

  function initRpSortable(){
    const tbody=el('rp-tbody');
    if(!tbody||!window.Sortable)return;
    if(tbody._sortable){tbody._sortable.destroy();}
    tbody._sortable=new window.Sortable(tbody,{animation:150,handle:'td:first-child',ghostClass:'sortable-ghost',onEnd:async({oldIndex,newIndex})=>{
      if(oldIndex===newIndex)return;
      const rows=[...tbody.querySelectorAll('tr[data-id]')];
      const updates=rows.map((tr,i)=>sb.from('momos_roasted_products').update({sort_order:i*10}).eq('product_code',tr.dataset.id));

  }

    const s=el('ptype-section');const b=s.previousElementSibling.querySelector('button');const o=s.style.display!=='none';

  window.saveRpEdit=async()=>{
    const code=el('rem-code').value,name=inp('rem-name'),type=el('rem-type').value,note=inp('rem-note');

        rows+=`<tr data-product="${p.product_code}" data-status="none" style="background:rgba(239,68,68,0.05)">
          <td><strong class="text-accent">${p.product_code}</strong></td>
          <td>${p.product_name}</td>
          <td colspan="3" style="color:var(--text2);font-style:italic">— BOM 미등록 —</td>
          <td>—</td>
          <td><span class="badge badge-danger">미등록</span></td>
          <td><button class="btn btn-sm btn-gold" onclick="openBomModalFor('${p.product_code}')">+ 등록</button></td>
          <td></td>
        </tr>`;
      } else {
        boms.forEach((r,i)=>{
          const rowBg=!sumOk?'background:rgba(245,158,11,0.05)':'';
          rows+=`<tr data-product="${r.product_code}" data-status="${status}" style="${rowBg}">`;
          if(i===0){
            rows+=`<td rowspan="${boms.length}"><strong class="text-accent">${p.product_code}</strong></td>
              <td rowspan="${boms.length}">${p.product_name}</td>`;
          }
          rows+=`<td><strong>${r.origin}</strong></td>
            <td>${r.processing_condition||'<span class="text-muted">전체</span>'}</td>
            <td><strong>${r.ratio}%</strong></td>`;
          if(i===0){
            rows+=`<td rowspan="${boms.length}"><span class="badge ${sumOk?'badge-success':'badge-danger'}">${sum.toFixed(1)}%</span></td>
              <td rowspan="${boms.length}">
                ${sumOk
                  ? `<span class="badge badge-success">완료 ✓</span>`
                  : `<span class="badge badge-warning" style="display:inline-flex;flex-direction:column;align-items:center;gap:1px;line-height:1.3">미달 ⚠<span style="font-size:10px;font-weight:400">${sum.toFixed(1)}% / 100%</span></span>`
                }
              </td>
              <td rowspan="${boms.length}" style="vertical-align:middle">
                <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-start">
                  <button class="btn btn-sm btn-outline" onclick="openBomEditAll('${p.product_code}','${(p.product_name||'').replace(/'/g,"\\'")}')">✏️ 수정</button>
                  <button class="btn btn-sm btn-danger-outline" onclick="deleteAllBom('${p.product_code}','${(p.product_name||'').replace(/'/g,"\\'")}')">🗑 전체삭제</button>
                </div>
              </td>`;
          }
          rows+=`<td></td></tr>`;
        });
      }
    });
    el('bom-tbody').innerHTML=rows||`<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text2)">표시할 원두가 없습니다.</td></tr>`;
  };
  renderBomTable();

  // ── BOM 등록 모달
  let _bomRowIdx=0;
  window.openBomModal=async()=>{
    _bomRowIdx=0;
    el('bm2-product').selectedIndex=0;
    el('bom-existing-info').textContent='';
    el('bom-modal-sum-info').textContent='';
    el('bom-rows-wrap').innerHTML='';
    addBomRow();
    openModal('bom-modal');
  };
  window.openBomModalFor=async(productCode)=>{
    _bomRowIdx=0;
    el('bom-existing-info').textContent='';
    el('bom-modal-sum-info').textContent='';
    el('bom-rows-wrap').innerHTML='';
    addBomRow();
    openModal('bom-modal');
    // 원두 선택 후 기존 정보 표시
    const sel=el('bm2-product');
    if(sel){sel.value=productCode;await bomModalProductChange();}
  };
  window.closeBomModal=()=>{closeModal('bom-modal');};

  window.addBomRow=()=>{
    const idx=_bomRowIdx++;
    const div=document.createElement('div');
    div.id=`bom-row-${idx}`;
    div.style.cssText='display:grid;grid-template-columns:1fr 1fr 90px 32px;gap:6px;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 10px';
    div.innerHTML=`
      <select class="sel" id="br-origin-${idx}" onchange="calcBomModalSum()" style="margin:0">
        <option value="">원산지 선택</option>${originOptsStr}
      </select>
      <select class="sel" id="br-processing-${idx}" onchange="calcBomModalSum()" style="margin:0">
        <option value="">가공방식(전체)</option>${processingOptsStr}
      </select>
      <input class="inp" type="number" id="br-ratio-${idx}" min="0.01" max="100" step="0.01" placeholder="비율%" oninput="calcBomModalSum()" style="margin:0;text-align:right">
      <button onclick="removeBomRow(${idx})" style="background:none;border:none;cursor:pointer;color:var(--danger);font-size:16px;padding:0;line-height:1" title="삭제">✕</button>`;
    el('bom-rows-wrap').appendChild(div);
    calcBomModalSum();
  };

  window.removeBomRow=(idx)=>{
    const d=el(`bom-row-${idx}`);
    if(d)d.remove();
    if(el('bom-rows-wrap').children.length===0)addBomRow();
    calcBomModalSum();
  };

  window.bomModalProductChange=async()=>{
    const code=el('bm2-product').value;
    if(!code){el('bom-existing-info').textContent='';el('bom-modal-sum-info').textContent='';return;}
    const{data}=await sb.from('momos_product_bom').select('origin,processing_condition,ratio').eq('product_code',code).eq('is_active',true);
    const ex=(data||[]).reduce((s,r)=>s+parseFloat(r.ratio||0),0);
    if(data&&data.length){
      el('bom-existing-info').innerHTML=`<span style="color:var(--text2)">기존 등록: </span>`+(data||[]).map(r=>`<span style="background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:2px 7px;font-size:12px;margin-right:4px">${r.origin}${r.processing_condition?' / '+r.processing_condition:''} <strong>${r.ratio}%</strong></span>`).join('')+`<span style="margin-left:6px;font-weight:700;color:${Math.abs(ex-100)<0.01?'var(--success)':'var(--warning)'}">합계 ${ex.toFixed(1)}%</span>`;
    } else {
      el('bom-existing-info').innerHTML=`<span style="color:var(--text2);font-size:12px">등록된 BOM 없음</span>`;
    }
    calcBomModalSum();
  };

  window.calcBomModalSum=async()=>{
    const code=el('bm2-product').value;
    const rows=[...el('bom-rows-wrap').children];
    const newTotal=rows.reduce((s,div)=>{
      const idx=div.id.replace('bom-row-','');
      return s+(parseFloat(el(`br-ratio-${idx}`)?.value)||0);
    },0);
    if(!code){el('bom-modal-sum-info').innerHTML=`새로 입력 합계: <strong>${newTotal.toFixed(1)}%</strong>`;return;}
    const{data}=await sb.from('momos_product_bom').select('ratio').eq('product_code',code).eq('is_active',true);
    const ex=(data||[]).reduce((s,r)=>s+parseFloat(r.ratio||0),0);
    const tot=ex+newTotal;
    const color=Math.abs(tot-100)<0.01?'var(--success)':tot>100?'var(--danger)':'var(--warning)';
    el('bom-modal-sum-info').innerHTML=`기존 합계: <strong>${ex.toFixed(1)}%</strong> + 새 입력: <strong>${newTotal.toFixed(1)}%</strong> = <strong style="color:${color}">${tot.toFixed(1)}%</strong>${Math.abs(tot-100)<0.01?' ✓':''}`;
  };

  window.saveBomItems=async()=>{
    const product_code=el('bm2-product').value;
    if(!product_code)return alert('원두를 선택하세요.');
    const rows=[...el('bom-rows-wrap').children];
    const items=rows.map(div=>{
      const idx=div.id.replace('bom-row-','');
      return{origin:el(`br-origin-${idx}`)?.value||'',processing:el(`br-processing-${idx}`)?.value||'',ratio:parseFloat(el(`br-ratio-${idx}`)?.value)||0};
    });
    const invalid=items.filter(r=>!r.origin||!r.ratio||r.ratio<=0);
    if(invalid.length)return alert('원산지와 배합비율(0 초과)은 필수입니다. 미입력 항목을 확인하세요.');
    const{data:existing}=await sb.from('momos_product_bom').select('ratio').eq('product_code',product_code).eq('is_active',true);
    const exSum=(existing||[]).reduce((s,r)=>s+parseFloat(r.ratio||0),0);
    const newSum=items.reduce((s,r)=>s+r.ratio,0);
    if(exSum+newSum>100.01)return alert(`BOM 합계 초과 (${(exSum+newSum).toFixed(1)}%). 배합비율 합계가 100%를 넘지 않도록 조정하세요.`);
    let ok=0,fail=0;
    for(const r of items){
      const{error}=await sb.from('momos_product_bom').insert({product_code,origin:r.origin,processing_condition:r.processing||null,variety_condition:null,grade_condition:null,ratio:r.ratio,is_active:true});
      if(!error)ok++;else fail++;
    }
    if(fail)alert(`저장 완료: ${ok}건 성공 / ${fail}건 실패`);
    closeBomModal();window._tabs['bom']();
  };

  // ── BOM 원두 단위 전체 수정
  let _bemRowIdx=0;
  let _bemProductCode='';
  let _bemExistingIds={}; // idx → bom_id (기존 행)

  window.openBomEditAll=async(productCode,productName)=>{
    _bemRowIdx=0;
    _bemProductCode=productCode;
    _bemExistingIds={};
    el('bem-title-code').textContent=`— ${productCode} ${productName}`;
    el('bem-rows-wrap').innerHTML='';
    // 기존 BOM 행 로드
    const{data:existing}=await sb.from('momos_product_bom').select('*').eq('product_code',productCode).eq('is_active',true);
    if(existing&&existing.length){
      existing.forEach(r=>addBemRow(r.bom_id,r.origin,r.processing_condition||'',r.ratio));
    } else {
      addBemRow();
    }
    calcBemSum();
    openModal('bom-edit-modal');
  };

  window.addBemRow=(bomId=null,origin='',processing='',ratio='')=>{
    const idx=_bemRowIdx++;
    if(bomId)_bemExistingIds[idx]=bomId;
    const div=document.createElement('div');
    div.id=`bem-row-${idx}`;
    div.dataset.bomId=bomId||'';
    div.style.cssText='display:grid;grid-template-columns:1fr 1fr 90px 32px;gap:6px;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 10px';
    div.innerHTML=`
      <select class="sel" id="ber-origin-${idx}" onchange="calcBemSum()" style="margin:0">
        <option value="">원산지 선택</option>${originOptsStr}
      </select>
      <select class="sel" id="ber-processing-${idx}" onchange="calcBemSum()" style="margin:0">
        <option value="">가공방식(전체)</option>${processingOptsStr}
      </select>
      <input class="inp" type="number" id="ber-ratio-${idx}" min="0.01" max="100" step="0.01" placeholder="비율%" oninput="calcBemSum()" style="margin:0;text-align:right" value="${ratio}">
      <button onclick="removeBemRow(${idx})" style="background:none;border:none;cursor:pointer;color:var(--danger);font-size:16px;padding:0;line-height:1" title="삭제">✕</button>`;
    el('bem-rows-wrap').appendChild(div);
    // 값 세팅 (select는 innerHTML 후 세팅해야 반영됨)
    if(origin)el(`ber-origin-${idx}`).value=origin;
    if(processing)el(`ber-processing-${idx}`).value=processing;
    calcBemSum();
  };

  window.removeBemRow=(idx)=>{
    const d=el(`bem-row-${idx}`);
    if(d)d.remove();
    if(el('bem-rows-wrap').children.length===0)addBemRow();
    calcBemSum();
  };

  window.calcBemSum=()=>{
    const rows=[...el('bem-rows-wrap').children];
    const total=rows.reduce((s,div)=>{
      const idx=div.id.replace('bem-row-','');
      return s+(parseFloat(el(`ber-ratio-${idx}`)?.value)||0);
    },0);
    const color=Math.abs(total-100)<0.01?'var(--success)':total>100?'var(--danger)':'var(--warning)';
    el('bem-sum-info').innerHTML=`배합비율 합계: <strong style="color:${color};font-size:15px">${total.toFixed(1)}%</strong>${Math.abs(total-100)<0.01?' ✓':'  ← 100%가 되어야 합니다'}`;
  };

  window.saveBomEditAll=async()=>{
    const rows=[...el('bem-rows-wrap').children];
    const items=rows.map(div=>{
      const idx=div.id.replace('bem-row-','');
      return{bomId:div.dataset.bomId||null,origin:el(`ber-origin-${idx}`)?.value||'',processing:el(`ber-processing-${idx}`)?.value||'',ratio:parseFloat(el(`ber-ratio-${idx}`)?.value)||0};
    });
    const invalid=items.filter(r=>!r.origin||!r.ratio||r.ratio<=0);
    if(invalid.length)return alert('원산지와 배합비율(0 초과)은 필수입니다.');
    const total=items.reduce((s,r)=>s+r.ratio,0);
    if(Math.abs(total-100)>0.01){
      const go=confirm(`배합비율 합계가 ${total.toFixed(1)}%입니다. (100% 미달)\n미완성 상태로 저장하시겠습니까?`);
      if(!go)return;
    }
    // 기존 BOM 전체 삭제 후 새로 insert
    const{error:delErr}=await sb.from('momos_product_bom').delete().eq('product_code',_bemProductCode);
    if(delErr)return alert('기존 BOM 삭제 실패: '+delErr.message);
    let ok=0,fail=0;
    for(const r of items){
      const{error}=await sb.from('momos_product_bom').insert({product_code:_bemProductCode,origin:r.origin,processing_condition:r.processing||null,variety_condition:null,grade_condition:null,ratio:r.ratio,is_active:true});
      if(!error)ok++;else fail++;
    }
    if(fail)alert(`저장: ${ok}건 성공 / ${fail}건 실패`);
    closeModal('bom-edit-modal');window._tabs['bom']();
  };

  window.deleteAllBom=async(productCode,productName)=>{
    if(!confirm(`"${productName}" (${productCode})의 BOM을 전체 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`))return;
    const{error}=await sb.from('momos_product_bom').delete().eq('product_code',productCode);
    if(error)return alert('삭제 실패: '+error.message);
    window._tabs['bom']();
  };
  window.deleteBomItem=async(id)=>{if(!confirm('이 BOM 항목을 삭제하시겠습니까?'))return;const{error}=await sb.from('momos_product_bom').delete().eq('bom_id',id);if(error)return alert('실패: '+error.message);window._tabs['bom']();};
};
// ══ 생두 보유현황
async function renderStock(filterType){
  const mc=el('main-content');mc.innerHTML='<div class="loading">로딩 중...</div>';
  // [FIX] UTC→KST 날짜
  const todayStr=window.getKSTToday();
  let query=sb.from('momos_green_bean_stock').select('*,momos_green_bean_items(item_name)').eq('base_date',todayStr).eq('is_active',true).order('item_code').range(0,9999);
  if(filterType&&filterType!=='all')query=query.eq('stock_type',filterType);
  const[{data:_rawData},{data:beanMaster},{data:bomData},{data:products},{data:prodRecent}]=await Promise.all([
    query,
    sb.from('momos_green_bean_items').select('item_code,item_name,origin,variety,processing,grade,arrival_date').eq('is_active',true).order('item_code'),
    sb.from('momos_product_bom').select('*').eq('is_active',true),
    sb.from('momos_roasted_products').select('product_code,product_name,product_type').eq('is_active',true),
    sb.from('momos_production_records').select('product_code,produced_kg,production_date').order('production_date',{ascending:false}).limit(500),
  ]);
  // [FIX] 오늘 데이터 없으면 최신 base_date로 fallback
  let data=_rawData||[];
  let displayDate=todayStr;
  let dateWarningHtml='';
  if(!data.length){
    let fbQ=sb.from('momos_green_bean_stock').select('*,momos_green_bean_items(item_name)').eq('is_active',true).order('base_date',{ascending:false}).order('item_code').range(0,9999);
    if(filterType&&filterType!=='all')fbQ=fbQ.eq('stock_type',filterType);
    const{data:fbData}=await fbQ;
    if(fbData&&fbData.length){
      const maxD=fbData[0].base_date;
      data=fbData.filter(r=>r.base_date===maxD);
      displayDate=maxD;
      dateWarningHtml=`<div class="alert alert-warning">⚠️ 오늘(${todayStr}) 동기화 데이터가 없습니다. 최근 기준일(${displayDate}) 데이터를 표시합니다.</div>`;
    }
  }
  const masterMap={};(beanMaster||[]).forEach(r=>{masterMap[r.item_code]=r;});

  // 7번: 원산지+가공방식 기준으로 BOM 매칭 제품 목록 계산
  // BOM에서 origin+processing 기준 → 어떤 제품이 몇 % 쓰는지
  function getBomProducts(stockOrigin, stockProcessing){
    const matched=[];
    (products||[]).forEach(p=>{
      const boms=(bomData||[]).filter(b=>{
        if(b.product_code!==p.product_code)return false;
        if(b.origin!==stockOrigin)return false;
        if(b.processing_condition){
          const pcs=b.processing_condition.split(';').map(s=>s.trim());
          if(!pcs.includes(stockProcessing))return false;
        }
        return true;
      });
      if(boms.length){
        const ratio=boms.reduce((s,b)=>s+parseFloat(b.ratio||0),0);
        matched.push({product_code:p.product_code,product_name:p.product_name,product_type:p.product_type,ratio});
      }
    });
    return matched;
  }

  const latestDate=displayDate;
  // [FIX] restrict_type='사용안함' 제외 기준 대시보드와 통일
  const totalQty=(data||[]).filter(r=>r.is_active).reduce((s,r)=>s+parseFloat(r.quantity_kg||0),0);
  const typeLabel=filterType==='생산용'?'생산용':filterType==='판매용'?'판매용':'전체';
  const dates=[...new Set((data||[]).map(r=>r.base_date))];
  const WH_NAME_MAP={
    D01:'동우(생산)', D04:'동우(생산확보)',
    D03:'동우(판매)',
    M01:'원재료(생산)', M11:'원재료(생산확보)',
    M10:'원재료(판매)',
  };

  // 보유현황 행 렌더 (드롭다운 포함)
  function renderStockRows(){
    if(!data||!data.length)return`<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text2)">등록된 보유현황이 없습니다.</td></tr>`;
    return data.map((r,i)=>{
      const m=masterMap[r.item_code]||{};
      const itemName=r.momos_green_bean_items?.item_name||m.item_name||'-';
      const bomProds=getBomProducts(r.origin,r.processing);
      const detId=`stock-det-${i}`;
      const whName=WH_NAME_MAP[r.warehouse_code]||r.warehouse_code||'-';
      const bomHtml=bomProds.length
        ?bomProds.map(p=>`<tr style="background:var(--accent-bg)"><td colspan="3" style="padding:5px 14px 5px 32px;font-size:12px"><span class="badge badge-accent" style="font-size:10px">${p.product_type}</span> <strong>${p.product_code}</strong> ${p.product_name}</td><td style="padding:5px 14px;font-size:12px;text-align:right;color:var(--accent);font-weight:600">${p.ratio}%</td><td colspan="9"></td></tr>`).join('')
        :`<tr style="background:var(--bg3)"><td colspan="9" style="padding:5px 14px 5px 32px;font-size:12px;color:var(--text3)">매칭되는 BOM 없음</td></tr>`;
      const hasMatch=bomProds.length>0;
      return`<tr data-code="${r.item_code}" data-date="${r.base_date}" data-name="${itemName}">
        <td><strong class="text-accent">${r.item_code}</strong></td>
        <td>${itemName}</td>
        <td><span class="badge ${r.stock_type==='생산용'?'badge-success':'badge-accent'}">${r.stock_type}</span></td>
        <td>
          <span style="cursor:${hasMatch?'pointer':'default'}" onclick="${hasMatch?`toggleStockDet('${detId}')`:''}" title="${hasMatch?'클릭하면 BOM 연결 제품 보기':''}">
            ${r.origin}${hasMatch?` <span style="font-size:10px;color:var(--accent);opacity:.7">▼</span>`:''}
          </span>
        </td>
        <td>${r.variety}</td>
        <td>${r.processing}</td>
        <td>${r.arrival_date}</td>
        <td style="text-align:right"><strong>${parseFloat(r.quantity_kg).toLocaleString('ko-KR', {minimumFractionDigits:0, maximumFractionDigits:2})}</strong></td>
        <td><button class="btn btn-sm btn-danger-outline" onclick="deleteStockItem('${r.lot_key}')">삭제</button></td>
      </tr>
      <tr id="${detId}" style="display:none"><td colspan="9" style="padding:0"><table style="width:100%;border-collapse:collapse">${bomHtml}</table></td></tr>`;
    }).join('');
  }

  mc.innerHTML=`
  <div class="page-header"><div class="page-title">생두 보유현황 — ${typeLabel}</div><div class="page-sub">이카운트 실시간 연동 · 기준일자: ${displayDate} · 원산지 클릭 시 BOM 연결 제품 확인</div></div>
  ${dateWarningHtml}

        result = await res.json();

        throw new Error('API 응답을 파싱할 수 없습니다. (JSON 형식 오류)');
      }

      // ── 4. 응답 로깅 (디버깅용) ──
      console.group('[이카운트 동기화] API 응답');
      console.log('HTTP Status:', res.status);
      console.log('Response:', result);
      console.groupEnd();
      syncInfo.raw_response = result;
      window._ecountSyncLogs.unshift({ time: new Date().toISOString(), result });
      if(window._ecountSyncLogs.length > 10) window._ecountSyncLogs.pop();

      // ── 5. success 여부 확인 ──
      if(!result.success) {
        syncInfo.error_msg = result.error || result.message || '알 수 없는 오류 (success: false)';
        syncInfo.rate_limit = result.rate_limit === true;
        if(syncInfo.rate_limit) syncInfo.status = 'rate_limit';
        window.showEcountSyncResult(syncInfo);
        return;
      }

      // ── 6. 실제 반영 건수 검증 ──
      const syncedCount = result.synced_count ?? result.inserted_count ?? result.count ?? null;
      if(syncedCount === null || syncedCount === undefined) {
        console.warn('[이카운트 동기화] synced_count 필드 없음 - API 응답 구조 확인 필요');
      }
      if(syncedCount === 0) {
        syncInfo.status = 'partial';
        syncInfo.error_msg = '동기화 응답은 성공이나 반영된 데이터가 0건입니다.\nAPI 응답 데이터를 확인하세요.';
        syncInfo.synced_count = 0;
        syncInfo.base_date = result.base_date || '-';
        window.showEcountSyncResult(syncInfo);
        return;
      }

      // ── 7. 미리보기 모드 처리 ──
      if(previewMode && result.preview_data) {
        window.showEcountPreview(result.preview_data, () => window.syncFromEcount(false));
        return;
      }

      // ── 8. 성공 처리 ──
      window._lastEcountSync = Date.now();
      const now = new Date();
      const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
      if(lastSyncEl) lastSyncEl.textContent = `마지막 동기화: ${timeStr}`;

      syncInfo.status = (result.unmapped_count > 0) ? 'partial' : 'success';
      syncInfo.base_date = result.base_date || '-';
      syncInfo.sync_time = timeStr;
      syncInfo.synced_count = syncedCount ?? '-';
      syncInfo.unmapped_count = result.unmapped_count ?? 0;
      syncInfo.unmapped_codes = result.unmapped_codes || [];

      window.showEcountSyncResult(syncInfo);

      // ── 9. DB에서 최신 데이터 확인 (반영 검증) ──
      const { data: verifyData, error: verifyErr } = await sb
        .from('momos_green_bean_stock')
        .select('base_date', { count: 'exact' })
        .eq('is_active', true)
        .order('base_date', { ascending: false })
        .limit(1);

        }
      }

      // ── 10. 화면 갱신 ──
      if(window._tabs && window._currentTab !== undefined) {
        window._tabs[window._currentTab]();
      }

    } catch(e) {
      console.error('[이카운트 동기화] 오류:', e);
      syncInfo.error_msg = e.message;
      window.showEcountSyncResult(syncInfo);
    } finally {
      btn.disabled = false;
      btn.innerHTML = origText;
      btn.style.opacity = '1';
    }

window._tabs['roasted-usage-history']=async()=>{

window._tabs['consumption-all']=()=>{window._conActiveTab='all';window._tabs['consumption']();};
