window._tabs['consumption']=async()=>{
  const mc=el('main-content');mc.innerHTML='<div class="loading">로딩 중...</div>';
  const thisMonth=new Date().toISOString().slice(0,7);

  // 페이지네이션으로 전체 소모 데이터 로드 (Supabase 1000건 limit 완전 우회)
  // count에 의존하지 않고 데이터가 없을 때까지 500건씩 반복 로드
  async function fetchAllConsumption(){
    const PAGE=500;
    let all=[];
    let from=0;
    while(true){
      const{data,error}=await sb.from('momos_green_bean_consumption')
        .select('*')
        .order('consume_date',{ascending:false})
        .range(from, from+PAGE-1);
      if(error||!data||data.length===0)break;
      all=all.concat(data);
      if(data.length<PAGE)break; // 마지막 페이지
      from+=PAGE;
    }
    return all;
  }

  const[consumeData,[{data:beanItems},{data:roastedProducts},{data:allBeanItems}]]=await Promise.all([
    fetchAllConsumption(),
    Promise.all([
      sb.from('momos_green_bean_items').select('item_code,item_name').eq('is_active',true).order('item_code'),
      sb.from('momos_roasted_products').select('product_code,product_name,product_type').eq('is_active',true).order('product_code'),
      sb.from('momos_green_bean_items').select('item_code,item_name,origin,processing,variety,grade,restrict_type').eq('is_active',true),
    ]),
  ]);
  // item_code → 속성맵
  const itemAttrMap={};(allBeanItems||[]).forEach(b=>{itemAttrMap[b.item_code]=b;});
  // KPI: 전체 기준
  const prodTotal=(consumeData||[]).filter(r=>r.consume_type==='생산소모').reduce((s,r)=>s+parseFloat(r.quantity_kg||0),0);
  const saleTotal=(consumeData||[]).filter(r=>r.consume_type==='판매소모').reduce((s,r)=>s+parseFloat(r.quantity_kg||0),0);
  const monthTotal=(consumeData||[]).filter(r=>r.consume_date?.startsWith(thisMonth)).reduce((s,r)=>s+parseFloat(r.quantity_kg||0),0);
  const totalCnt=(consumeData||[]).length;

  if(!window._conActiveTab)window._conActiveTab='all';

  function buildProdDrilldown(days){
    // 원두코드 → 원두명 맵
    const rpMap={};(roastedProducts||[]).forEach(p=>{rpMap[p.product_code]=p.product_name;});
    const cutoffKST=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
    cutoffKST.setDate(cutoffKST.getDate()-days);
    const cutoffStr=cutoffKST.toISOString().split('T')[0];
    const prodData=(consumeData||[]).filter(r=>r.consume_type==='생산소모'&&r.consume_date>=cutoffStr);
    const prodMap={};
    prodData.forEach(r=>{
      const pc=r.linked_product_code||'(미연결)';
      const pn=rpMap[pc]||r.linked_product_name||pc;
      if(!prodMap[pc])prodMap[pc]={product_code:pc,product_name:pn,total_kg:0,originMap:{}};
      prodMap[pc].total_kg+=parseFloat(r.quantity_kg||0);
      const b=itemAttrMap[r.item_code];
      const origin=b?.origin||'미확인';const processing=b?.processing||'미확인';
      const opKey=origin+'||'+processing;
      if(!prodMap[pc].originMap[opKey])prodMap[pc].originMap[opKey]={origin,processing,total_kg:0,beanMap:{}};
      prodMap[pc].originMap[opKey].total_kg+=parseFloat(r.quantity_kg||0);
      const ic=r.item_code;
      const iname=b?.item_name||r.item_name||ic;
      if(!prodMap[pc].originMap[opKey].beanMap[ic])prodMap[pc].originMap[opKey].beanMap[ic]={item_code:ic,item_name:iname,total_kg:0};
      prodMap[pc].originMap[opKey].beanMap[ic].total_kg+=parseFloat(r.quantity_kg||0);
    });
    return Object.values(prodMap).sort((a,b)=>b.total_kg-a.total_kg);
  }

  function buildSaleDrilldown(days){
    const cutoffKST=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
    cutoffKST.setDate(cutoffKST.getDate()-days);
    const cutoffStr=cutoffKST.toISOString().split('T')[0];
    const saleData=(consumeData||[]).filter(r=>r.consume_type==='판매소모'&&r.consume_date>=cutoffStr);
    const chMap={};
    saleData.forEach(r=>{
      const ch=r.sale_channel||'미분류';
      if(!chMap[ch])chMap[ch]={channel:ch,total_kg:0,originMap:{}};
      chMap[ch].total_kg+=parseFloat(r.quantity_kg||0);
      const b=itemAttrMap[r.item_code];
      const origin=b?.origin||'미확인';const processing=b?.processing||'미확인';
      const opKey=origin+'||'+processing;
      if(!chMap[ch].originMap[opKey])chMap[ch].originMap[opKey]={origin,processing,total_kg:0,beanMap:{}};
      chMap[ch].originMap[opKey].total_kg+=parseFloat(r.quantity_kg||0);
      const ic=r.item_code;
      const iname=b?.item_name||r.item_name||ic;
      if(!chMap[ch].originMap[opKey].beanMap[ic])chMap[ch].originMap[opKey].beanMap[ic]={item_code:ic,item_name:iname,total_kg:0};
      chMap[ch].originMap[opKey].beanMap[ic].total_kg+=parseFloat(r.quantity_kg||0);
    });
    return Object.values(chMap).sort((a,b)=>b.total_kg-a.total_kg);
  }

  function renderBeanRows(beanMap){
    return Object.values(beanMap).sort((a,b)=>b.total_kg-a.total_kg).map(bn=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 16px 6px 36px;border-bottom:1px solid var(--border);font-size:12px;background:var(--bg1)">
        <div><span style="color:var(--accent);font-weight:600;font-size:11px">${bn.item_code}</span><span style="color:var(--text2);margin-left:8px">${bn.item_name}</span></div>
        <strong style="white-space:nowrap;color:var(--text)">${bn.total_kg.toLocaleString()}kg</strong>
      </div>`).join('');
  }

  function renderOriginRows(originMap,prefix){
    // beanMap을 window에 저장해두고 클릭 시 lazy 렌더링
    return Object.values(originMap).sort((a,b)=>b.total_kg-a.total_kg).map((op,oi)=>{
      const opId=prefix+'-op-'+oi;
      const storeKey='__beanMap_'+opId;
      window[storeKey]=op.beanMap; // beanMap 미리 저장
      return`<div style="border-bottom:1px solid var(--border)">
        <div onclick="lazyToggleOrigin('${opId}','${storeKey}')" style="display:flex;justify-content:space-between;align-items:center;padding:8px 16px 8px 20px;cursor:pointer;background:var(--bg3);font-size:12px;transition:background .1s" onmouseover="this.style.background='var(--accent-bg)'" onmouseout="this.style.background='var(--bg3)'">
          <div style="display:flex;align-items:center;gap:8px">
            <span style="width:3px;height:14px;background:var(--accent);border-radius:2px;display:inline-block"></span>
            <span style="font-weight:600">${op.origin}</span><span style="color:var(--text2);margin-left:4px">/ ${op.processing}</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px"><strong>${op.total_kg.toLocaleString()}kg</strong><span style="color:var(--text3);font-size:10px">▼</span></div>
        </div>
        <div id="${opId}" style="display:none"></div>
      </div>`;
    }).join('');
  }

  // 기간별 1일 평균 소모량 계산
  if(!window._conAvgDays)window._conAvgDays=30;
  function calcDailyAvg(filterFn, days){
    const cutoff=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));cutoff.setDate(cutoff.getDate()-days);
    const cutoffStr=cutoff.toISOString().split('T')[0];
    const filtered=(consumeData||[]).filter(r=>filterFn(r)&&r.consume_date>=cutoffStr);
    return filtered.reduce((s,r)=>s+parseFloat(r.quantity_kg||0),0)/days;
  }
  function getProdDailyAvg(product_code, days){
    return calcDailyAvg(r=>r.consume_type==='생산소모'&&r.linked_product_code===product_code, days);
  }
  function getSaleDailyAvg(channel, days){
    return calcDailyAvg(r=>r.consume_type==='판매소모'&&(r.sale_channel||'미분류')===channel, days);
  }

  function renderProdDrilldownHtml(){
    const days=window._conAvgDays||30;
    const data=buildProdDrilldown(days);
    if(!data.length)return '<div style="padding:40px;text-align:center;color:var(--text2)">등록된 생산소모 데이터가 없습니다.</div>';
    return data.map((prod,pi)=>{
      const prodId='pd-prod-'+pi;
      const daily=getProdDailyAvg(prod.product_code,days);
      const dailyHtml=daily>0?`<span style="font-size:12px;color:var(--success);font-weight:600;background:rgba(16,185,129,.1);padding:2px 8px;border-radius:10px">${daily.toFixed(1)}kg/일</span>`:'';
      const prodStoreKey='__originMap_'+prodId;
      window[prodStoreKey]={originMap:prod.originMap,prefix:'pd-'+pi};
      return`<div class="card" style="margin-bottom:12px;overflow:hidden;padding:0">
        <div onclick="lazyToggleProd('${prodId}','${prodStoreKey}')" style="display:flex;justify-content:space-between;align-items:center;padding:13px 16px;cursor:pointer;transition:background .1s" onmouseover="this.style.background='var(--accent-bg)'" onmouseout="this.style.background=''">
          <div style="display:flex;align-items:center;gap:12px">
            <span style="font-size:15px;font-weight:700;color:var(--accent)">${prod.product_code}</span>
            <span style="font-size:13px;font-weight:600">${prod.product_name}</span>
            <span style="font-size:11px;color:var(--text2)">${Object.keys(prod.originMap).length}개 원산지/가공</span>
            ${dailyHtml}
          </div>
          <div style="display:flex;align-items:center;gap:12px">
            <span style="font-size:15px;font-weight:700">${prod.total_kg.toLocaleString()}<span style="font-size:12px;color:var(--text2);font-weight:400">kg</span></span>
            <span style="color:var(--text3)">▼</span>
          </div>
        </div>
        <div id="${prodId}" style="display:none;border-top:1px solid var(--border)"></div>
      </div>`;
    }).join('');
  }

  function renderSaleDrilldownHtml(){
    const days=window._conAvgDays||30;
    const data=buildSaleDrilldown(days);
    if(!data.length)return '<div style="padding:40px;text-align:center;color:var(--text2)">등록된 판매소모 데이터가 없습니다.</div>';
    const chColor={'사업자':'#2563eb','온라인':'#7c3aed','미분류':'var(--text3)'};
    const chIcon={'사업자':'🏢','온라인':'🛒','미분류':'📦'};
    return data.map((ch,ci)=>{
      const chId='sd-ch-'+ci;
      const color=chColor[ch.channel]||'var(--text3)';
      const icon=chIcon[ch.channel]||'📦';
      const daily=getSaleDailyAvg(ch.channel,days);
      const dailyHtml=daily>0?`<span style="font-size:12px;color:var(--success);font-weight:600;background:rgba(16,185,129,.1);padding:2px 8px;border-radius:10px">${daily.toFixed(1)}kg/일</span>`:'';
      return`<div class="card" style="margin-bottom:12px;overflow:hidden;padding:0;border-left:4px solid ${color}">
        <div onclick="toggleEl('${chId}')" style="display:flex;justify-content:space-between;align-items:center;padding:13px 16px;cursor:pointer;transition:background .1s" onmouseover="this.style.background='var(--accent-bg)'" onmouseout="this.style.background=''">
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:18px">${icon}</span>
            <span style="font-size:15px;font-weight:700;color:${color}">${ch.channel}</span>
            <span style="font-size:11px;color:var(--text2)">${Object.keys(ch.originMap).length}개 원산지/가공</span>
            ${dailyHtml}
          </div>
          <div style="display:flex;align-items:center;gap:12px">
            <span style="font-size:15px;font-weight:700">${ch.total_kg.toLocaleString()}<span style="font-size:12px;color:var(--text2);font-weight:400">kg</span></span>
            <span style="color:var(--text3)">▼</span>
          </div>
        </div>
        <div id="${chId}" style="display:none;border-top:1px solid var(--border)">${renderOriginRows(ch.originMap,'sd-'+ci)}</div>
      </div>`;
    }).join('');
  }

  function getDateRange(days){
    const now=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
    const end=now.toISOString().split('T')[0];
    const start=new Date(now);start.setDate(start.getDate()-days+1);
    return{start:start.toISOString().split('T')[0],end};
  }

  function renderConTab(tab){
    window._conActiveTab=tab;
    ['all','prod','sale'].forEach(t=>{
      const b=el('con-tab-'+t);
      if(b){b.style.color=t===tab?'var(--accent)':'var(--text2)';b.style.borderBottom=t===tab?'2px solid var(--accent)':'2px solid transparent';b.style.fontWeight=t===tab?'700':'400';}
    });
    [7,30,90].forEach(d=>{
      const b=el('con-avg-'+d);
      if(b)b.className='btn btn-sm '+(window._conAvgDays===d?'btn-gold':'btn-outline');
    });
    // 날짜 범위 표시
    const days=window._conAvgDays||30;
    const{start,end}=getDateRange(days);
    const rangeEl=el('con-date-range');
    if(rangeEl)rangeEl.textContent=`${start} ~ ${end} (${days}일)`;
    const area=el('con-drill-area');if(!area)return;
    if(tab==='prod')area.innerHTML=renderProdDrilldownHtml();
    else if(tab==='sale')area.innerHTML=renderSaleDrilldownHtml();
    else area.innerHTML=''; // 전체탭은 드릴다운 없이 이력만
    // 상세 이력 렌더
    renderConHistory(tab);
  }
  window.setConAvgDays=(d)=>{window._conAvgDays=d;window._tabs['consumption']();};
  // 드롭다운 클릭 시 원산지 행을 그때 렌더링 (렉 방지)
  window.lazyToggleProd=(id,storeKey)=>{
    const el_=document.getElementById(id);if(!el_)return;
    const isOpen=el_.style.display!=='none';
    if(isOpen){el_.style.display='none';return;}
    if(!el_.innerHTML.trim()){
      const stored=window[storeKey];
      if(stored)el_.innerHTML=renderOriginRows(stored.originMap,stored.prefix);
    }
    el_.style.display='block';
  };
  window.lazyToggleOrigin=(id,storeKey)=>{
    const el_=document.getElementById(id);if(!el_)return;
    const isOpen=el_.style.display!=='none';
    if(isOpen){el_.style.display='none';return;}
    if(!el_.innerHTML.trim()){
      const beanMap=window[storeKey];
      if(beanMap)el_.innerHTML=renderBeanRows(beanMap);
    }
    el_.style.display='block';
  };

  // ── 전체 드릴다운 (생산+판매 합산)
  function renderAllDrilldownHtml(){
    const prodHtml=renderProdDrilldownHtml();
    const saleHtml=renderSaleDrilldownHtml();
    return`<div style="font-size:13px;font-weight:700;color:var(--text1);margin-bottom:10px;padding:4px 0;border-bottom:1px solid var(--border)">🏭 생산소모</div>${prodHtml}<div style="font-size:13px;font-weight:700;color:var(--text1);margin:20px 0 10px;padding:4px 0;border-bottom:1px solid var(--border)">💰 판매소모</div>${saleHtml}`;
  }

  // ── 상세 이력 (날짜별, 체크박스 삭제)
  function renderConHistory(tab){
    const hArea=el('con-history-area');if(!hArea)return;
    const typeFilter=tab==='prod'?'생산소모':tab==='sale'?'판매소모':null;
    const rpMap={};(roastedProducts||[]).forEach(p=>{rpMap[p.product_code]=p.product_name;});

    // 날짜 필터 상태
    if(!window._conDateMode)window._conDateMode='all';
    if(!window._conTypeFilter)window._conTypeFilter='all';
    const todayStr=window.getKSTToday();

    function applyDateFilter(rows){
      const mode=window._conDateMode;
      let r=rows;
      if(mode==='day'){const d=window._conDayVal||todayStr;r=r.filter(x=>x.consume_date===d);}
      else if(mode==='month'){const m=window._conMonthVal||todayStr.slice(0,7);r=r.filter(x=>x.consume_date?.startsWith(m));}
      else if(mode==='year'){const y=window._conYearVal||todayStr.slice(0,4);r=r.filter(x=>x.consume_date?.startsWith(y));}
      else if(mode==='range'){
        const s=window._conDateFrom||'';const e=window._conDateTo||'';
        r=r.filter(x=>(!s||x.consume_date>=s)&&(!e||x.consume_date<=e));
      }
      if(window._conTypeFilter&&window._conTypeFilter!=='all')
        r=r.filter(x=>x.consume_type===window._conTypeFilter);
      return r;
    }

    const baseFiltered=(consumeData||[]).filter(r=>!typeFilter||r.consume_type===typeFilter);
    const filtered=applyDateFilter(baseFiltered);

    function getRangeLabel(){
      const m=window._conDateMode;
      if(m==='day')return window._conDayVal||todayStr;
      if(m==='month'){const mv=window._conMonthVal||todayStr.slice(0,7);return`${mv}-01 ~ ${mv}-31`;}
      if(m==='year'){const yv=window._conYearVal||todayStr.slice(0,4);return`${yv}-01-01 ~ ${yv}-12-31`;}
      if(m==='range'&&window._conDateFrom)return`${window._conDateFrom} ~ ${window._conDateTo||todayStr}`;
      return '';
    }
    const rangeLabel=getRangeLabel();
    const modeLabels={all:'전체',day:'일',month:'월',year:'년',range:'특정기간'};
    const filterBarHtml=`
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap">
      <span style="font-size:12px;color:var(--text2);font-weight:500">기간:</span>
      ${['all','day','month','year','range'].map(m=>`<button onclick="setConDateMode('${m}')" id="con-dm-${m}" class="btn btn-sm ${window._conDateMode===m?'btn-gold':'btn-outline'}" style="font-size:12px">${modeLabels[m]}</button>`).join('')}
      <span style="font-size:11px;color:var(--accent);font-weight:500;margin-left:2px">${rangeLabel}</span>
      <div style="display:${window._conDateMode==='day'?'flex':'none'};align-items:center;gap:4px">
        <input type="date" class="inp" style="padding:4px 8px;font-size:12px;width:140px" value="${window._conDayVal||todayStr}" onchange="window._conDayVal=this.value;refreshConHistory()">
      </div>
      <div style="display:${window._conDateMode==='month'?'flex':'none'};align-items:center;gap:4px">
        <input type="month" class="inp" style="padding:4px 8px;font-size:12px;width:140px" value="${window._conMonthVal||todayStr.slice(0,7)}" onchange="window._conMonthVal=this.value;refreshConHistory()">
      </div>
      <div style="display:${window._conDateMode==='year'?'flex':'none'};align-items:center;gap:4px">
        <select class="sel" style="padding:4px 8px;font-size:12px;width:100px" onchange="window._conYearVal=this.value;refreshConHistory()">
          ${Array.from({length:5},(_,i)=>new Date().getFullYear()-i).map(y=>`<option value="${y}" ${(window._conYearVal||String(new Date().getFullYear()))===String(y)?'selected':''}>${y}년</option>`).join('')}
        </select>
      </div>
      <div id="con-range-wrap" style="display:${window._conDateMode==='range'?'flex':'none'};align-items:center;gap:6px">
        <input type="date" id="con-date-from" class="inp" style="padding:4px 8px;font-size:12px;width:130px" value="${window._conDateFrom||''}" onchange="window._conDateFrom=this.value;refreshConHistory()">
        <span style="color:var(--text2)">~</span>
        <input type="date" id="con-date-to" class="inp" style="padding:4px 8px;font-size:12px;width:130px" value="${window._conDateTo||todayStr}" onchange="window._conDateTo=this.value;refreshConHistory()">
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap">
      <span style="font-size:12px;color:var(--text2);font-weight:500">소모구분:</span>
      ${['전체','생산소모','판매소모'].map(t=>{
        const v=t==='전체'?'all':t;
        const active=(window._conTypeFilter||'all')===v;
        return`<button onclick="setConTypeFilter('${v}')" id="con-tf-${v}" class="btn btn-sm ${active?'btn-gold':'btn-outline'}" style="font-size:12px">${t}</button>`;
      }).join('')}
      <span style="font-size:12px;color:var(--text3);margin-left:6px">${filtered.length}건 / 전체 ${baseFiltered.length}건</span>
    </div>`;

    // 페이지네이션: 100건씩 표시
    const PAGE_SIZE=100;
    if(!window._conHistPage)window._conHistPage=0;
    const totalPages=Math.ceil(filtered.length/PAGE_SIZE);
    const page=Math.min(window._conHistPage, Math.max(0,totalPages-1));
    const pageRows=filtered.slice(page*PAGE_SIZE,(page+1)*PAGE_SIZE);

    function renderPageRows(rows){
      return rows.map(r=>{
        const b=itemAttrMap[r.item_code]||{};
        const rp_code=r.consume_type==='생산소모'
          ?(r.linked_product_code?`<span class="badge badge-success" style="font-size:11px;white-space:nowrap">${r.linked_product_code}</span>`:'<span class="badge badge-warning" style="font-size:11px">미지정</span>')
          :(r.sale_channel?`<span class="badge" style="font-size:11px;background:rgba(124,58,237,.1);color:#7c3aed;white-space:nowrap">${r.sale_channel}</span>`:'<span class="text-muted">-</span>');
        const rp_name=r.consume_type==='생산소모'
          ?(r.linked_product_code?(rpMap[r.linked_product_code]||r.linked_product_name||'-'):'-')
          :'-';
        return`<tr>
          <td style="text-align:center"><input type="checkbox" class="con-chk" data-id="${r.consumption_id}" onchange="conUpdateSelCount()" style="width:15px;height:15px;cursor:pointer"></td>
          <td style="white-space:nowrap">${r.consume_date}</td>
          <td><span class="badge ${r.consume_type==='생산소모'?'badge-success':'badge-accent'}" style="font-size:11px">${r.consume_type}</span></td>
          <td>${rp_code}</td>
          <td style="font-size:12px;color:var(--text2)">${rp_name}</td>
          <td style="white-space:nowrap"><strong class="text-accent">${r.item_code}</strong></td>
          <td style="font-size:12px">${r.item_name||b.item_name||'-'}</td>
          <td style="font-size:12px;white-space:nowrap">${b.origin||'-'}</td>
          <td style="font-size:12px;white-space:nowrap">${b.processing||'-'}</td>
          <td style="text-align:right;white-space:nowrap"><strong>${parseFloat(r.quantity_kg).toLocaleString()}</strong> kg</td>
          <td class="text-muted" style="font-size:12px">${r.note||'-'}</td>
        </tr>`;
      }).join('');
    }

    const pagerHtml=totalPages>1?`
    <div style="display:flex;align-items:center;gap:6px;margin-top:10px;flex-wrap:wrap">
      <button class="btn btn-sm btn-outline" onclick="window._conHistPage=0;refreshConHistory()" ${page===0?'disabled':''}>◀◀</button>
      <button class="btn btn-sm btn-outline" onclick="window._conHistPage=Math.max(0,${page}-1);refreshConHistory()" ${page===0?'disabled':''}>◀</button>
      <span style="font-size:12px;color:var(--text2)">${page+1} / ${totalPages}페이지</span>
      <button class="btn btn-sm btn-outline" onclick="window._conHistPage=Math.min(${totalPages-1},${page}+1);refreshConHistory()" ${page>=totalPages-1?'disabled':''}>▶</button>
      <button class="btn btn-sm btn-outline" onclick="window._conHistPage=${totalPages-1};refreshConHistory()" ${page>=totalPages-1?'disabled':''}>▶▶</button>
      <span style="font-size:11px;color:var(--text3);margin-left:4px">${page*PAGE_SIZE+1}~${Math.min((page+1)*PAGE_SIZE,filtered.length)}건 표시</span>
    </div>`:'';

    const tableHtml=filtered.length?`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <input type="checkbox" id="con-chk-all" onchange="conToggleAll(this.checked)" style="width:16px;height:16px;cursor:pointer">
      <label for="con-chk-all" style="font-size:12px;color:var(--text2);cursor:pointer">전체 선택</label>
      <button class="btn btn-sm btn-danger-outline" onclick="conDeleteSelected()" style="margin-left:8px">🗑 선택 삭제</button>
      <span id="con-sel-count" style="font-size:12px;color:var(--text2)"></span>
    </div>
    <div class="table-wrap"><table>
      <thead><tr>

// ── 분석 공통 함수
// 1일 사용량 기준: 생두 소모관리(momos_green_bean_consumption) 실적 기반
// 계산식: 생두 1일 사용량 = AVG_DAYS 기간 내 총 소모량 ÷ AVG_DAYS
async function loadAnalysisData(opts={}){
  const{data:settings}=await sb.from('momos_app_settings').select('key,value');
  const cfg={};(settings||[]).forEach(r=>cfg[r.key]=r.value);
  const AVG_DAYS=opts.avg_days_override||parseInt(cfg.avg_production_days||'30');
  const SAFETY_DAYS=parseInt(cfg.safety_buffer_days||'14');
  const LEAD_TIME=parseInt(cfg.lead_time_days||'14');
  const TARGET_MULTI=parseFloat(cfg.target_stock_multiplier||'2.0');

  // KST 기준 cutoff 날짜
  const cutoffKST=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
  cutoffKST.setDate(cutoffKST.getDate()-AVG_DAYS);
  const cutoffStr=cutoffKST.toISOString().split('T')[0];

  const[{data:stockData},{data:products},{data:beanMasterData},{data:conData}]=await Promise.all([
    sb.from('momos_green_bean_stock').select('*').eq('is_active',true).order('base_date',{ascending:false}).range(0,9999),
    sb.from('momos_roasted_products').select('*').eq('is_active',true),
    sb.from('momos_green_bean_items').select('item_code,item_name').eq('is_active',true),
    // 생두 소모관리 실적 (생산소모 + 판매소모)
    sb.from('momos_green_bean_consumption').select('item_code,quantity_kg,consume_date,linked_product_code,consume_type').gte('consume_date',cutoffStr).range(0,9999),
  ]);

  const beanNameMap={};const inactiveItemSet=new Set();(beanMasterData||[]).forEach(r=>{beanNameMap[r.item_code]=r.item_name;});
  // restrict_type 별도 조회 (사용안함 품목 필터용)
  try{
    const{data:restrictData}=await sb.from('momos_green_bean_items').select('item_code,restrict_type').eq('restrict_type','사용안함');
    (restrictData||[]).forEach(r=>inactiveItemSet.add(r.item_code));
  }catch(e){console.warn('restrict_type 조회 실패, 필터 미적용:',e);}
  // [이카운트 연동 대응]
  // 이카운트는 창고별로 행이 분리되고, 창고마다 base_date가 다를 수 있음
  // → item_code+stock_type+warehouse_code 기준으로 최신 base_date 행 1개만 선택 후,
  //   item_code+stock_type 기준으로 합산
  // lot_key는 _lot_keys 배열에 모아서 allowedMap(특정제품전용) 체크 시 모두 참조
  function mergeLatestStock(rows, stockType){
    // [디버그] Colombia Washed 원본 행 확인
    if(stockType==='생산용'){
      const dbg=rows.filter(r=>r.stock_type===stockType&&r.origin==='Colombia'&&r.processing==='Washed');
      console.log('[mergeLatest] Colombia Washed 원본',dbg.length,'개:',JSON.stringify(dbg.map(r=>({ic:r.item_code,wh:r.warehouse_code||'null',dt:r.base_date,qty:r.quantity_kg}))));
    }
    // 1단계: item_code+stock_type+warehouse_code 별 최신 base_date 행 선택
    const latestByWh={};
    rows.filter(r=>r.stock_type===stockType).forEach(r=>{
      const key=r.item_code+'||'+stockType+'||'+(r.warehouse_code||'_');
      if(!latestByWh[key]||r.base_date>latestByWh[key].base_date){
        latestByWh[key]=r;
      }
    });
    // 2단계: item_code+stock_type 기준 합산
    const merged={};
    Object.values(latestByWh).forEach(r=>{
      const key=r.item_code+'||'+stockType;
      if(!merged[key]){
        merged[key]={...r, quantity_kg:parseFloat(r.quantity_kg||0), _lot_keys:[r.lot_key]};
      } else {
        merged[key].quantity_kg+=parseFloat(r.quantity_kg||0);
        if(r.lot_key)merged[key]._lot_keys.push(r.lot_key);
        // base_date는 가장 최신으로 유지
        if(r.base_date>merged[key].base_date)merged[key].base_date=r.base_date;
      }
    });
    return Object.values(merged);
  }
  const latestStockProd=mergeLatestStock(stockData||[],'생산용');
  const latestStockSale=mergeLatestStock(stockData||[],'판매용');
  const maxDateProd=latestStockProd.reduce((m,r)=>r.base_date>m?r.base_date:m,'');
  const maxDateSale=latestStockSale.reduce((m,r)=>r.base_date>m?r.base_date:m,'');
  const maxDate=maxDateProd||maxDateSale;
  const latestStock=[...latestStockProd,...latestStockSale];
  // [디버그] 합산 후 Colombia Washed 확인
  const dbgCol=latestStock.filter(s=>s.stock_type==='생산용'&&s.origin==='Colombia'&&s.processing==='Washed');
  console.log('[latestStock] Colombia Washed 합산 후',dbgCol.length,'개:',JSON.stringify(dbgCol.map(r=>({ic:r.item_code,qty:r.quantity_kg,lots:r._lot_keys?.length}))));
  console.log('[latestStock] Colombia Washed 총합:',dbgCol.reduce((s,r)=>s+parseFloat(r.quantity_kg||0),0));

  // [1] 생두 품목코드별 기간 내 총 소모량 집계
  const conByItem={};
  (conData||[]).forEach(r=>{conByItem[r.item_code]=(conByItem[r.item_code]||0)+parseFloat(r.quantity_kg||0);});

  // [2] BOM 로드 (원두별 배합비)
  const{data:bomForAvg}=await sb.from('momos_product_bom').select('product_code,origin,processing_condition,variety_condition,grade_condition,ratio').eq('is_active',true);

  // BOM 매칭 헬퍼
  function matchBomToStock(bom,stock){
    if(bom.origin!==stock.origin)return false;
    if(bom.processing_condition&&!bom.processing_condition.split(';').map(s=>s.trim()).includes(stock.processing))return false;
    // 이카운트 연동 데이터는 variety/grade가 null일 수 있음 → 비어있으면 조건 무시(매칭 허용)
    if(bom.variety_condition&&stock.variety&&!bom.variety_condition.split(';').map(s=>s.trim()).includes(stock.variety))return false;
    if(bom.grade_condition&&stock.grade&&!bom.grade_condition.split(';').map(s=>s.trim()).includes(stock.grade))return false;
    return true;
  }

  // [3] 원두별 1일 평균 생산량 = 소모 실적에서 linked_product_code 기준 직접 집계
  // 생두 소모관리에 linked_product_code가 기록되어 있으므로 역산 불필요
  const prodByProduct={};
  (conData||[]).filter(r=>r.consume_type==='생산소모'&&r.linked_product_code).forEach(r=>{
    prodByProduct[r.linked_product_code]=(prodByProduct[r.linked_product_code]||0)+parseFloat(r.quantity_kg||0);
  });
  // avgProd[product_code] = 기간 내 총 생산 투입량 ÷ AVG_DAYS
  // (생두 소모량 합계 = 원두 생산량이므로 직접 사용)
  // 단, 원두 1개 생산에 생두 여러 종이 들어가므로 BOM 합계(100%)로 나눠야 순수 원두 생산량
  // → 가장 단순하고 정확한 방법: linked_product_code별 총 소모량 ÷ AVG_DAYS = 생두 투입량/일
  // → 원두 생산량/일 = 생두 투입량/일 (BOM 합계가 100%이면 동일)
  // 실제로는 생두 투입량 ≈ 원두 생산량 (로스율 무시)
  const avgProd={};
  (products||[]).forEach(p=>{
    // linked_product_code 기준 생두 소모 합계를 원두별 BOM 비율 합계로 나눠 생산량 역산
    // 더 정확한 방법: 각 BOM 항목별 생두 소모량 ÷ 배합비율로 역산 후 평균
    const boms=(bomForAvg||[]).filter(b=>b.product_code===p.product_code);
    const totalRatio=boms.reduce((s,b)=>s+parseFloat(b.ratio||0),0); // 보통 100
    const totalProdKg=prodByProduct[p.product_code]||0;
    if(totalProdKg>0&&totalRatio>0){
      // 생두 총 투입량 ÷ BOM합계비율 = 원두 순생산량
      avgProd[p.product_code]=(totalProdKg/AVG_DAYS)*(100/totalRatio);
    }
  });

  // [4] getDU: 생두 lot 기준 1일 소모량
  // = 이 생두를 쓰는 모든 원두의 (avgProd × BOM비율) 합산
  function getDU(stock){
    let totalDU=0;
    (bomForAvg||[]).forEach(bom=>{
      if(!matchBomToStock(bom,stock))return;
      const productAvg=avgProd[bom.product_code]||0;
      const ratio=parseFloat(bom.ratio||0)/100;
      totalDU+=productAvg*ratio;
    });
    // BOM 미매칭이면 0 반환 (계산불가)
    return totalDU;
  }

  // [4-b] getDUBreakdown: 1일사용량 계산 근거 상세 반환
  // 원두별로 (원두평균생산량/일 × BOM비율 = 이 생두 기여량) 목록 반환
  function getDUBreakdown(stock){
    const breakdown=[];
    let bomTotal=0;
    (bomForAvg||[]).forEach(bom=>{
      if(!matchBomToStock(bom,stock))return;
      const productAvg=avgProd[bom.product_code]||0;
      const ratio=parseFloat(bom.ratio||0)/100;
      const contribution=productAvg*ratio;
      bomTotal+=contribution;
      const prod=(products||[]).find(p=>p.product_code===bom.product_code);
      breakdown.push({
        product_code:bom.product_code,
        product_name:prod?prod.product_name:'',
        ratio_pct:parseFloat(bom.ratio||0),
        avg_prod_per_day:productAvg,
        contribution,
      });
    });
    // fallback 없음 — BOM 미매칭이면 isFallback=true, fallbackDU=0
    const isFallback=bomTotal===0;
    const fallbackDU=0;
    return{breakdown,bomTotal,isFallback,fallbackDU,AVG_DAYS};
  }

  return{cfg,AVG_DAYS,SAFETY_DAYS,LEAD_TIME,TARGET_MULTI,maxDate,latestStock,getDU,getDUBreakdown,products,avgProd,beanNameMap,conByItem,inactiveItemSet};
}

window._tabs['product-stock']=async()=>{
  const mc=el('main-content');mc.innerHTML='<div class="loading">분석 중...</div>';
  const selDays=window._psAvgDays||null;
  const{AVG_DAYS,SAFETY_DAYS,maxDate,latestStock,getDU,products,avgProd,inactiveItemSet}=await loadAnalysisData(selDays?{avg_days_override:selDays}:{});
  const usedDays=selDays||AVG_DAYS;

  // BOM + safety rules 로드
  const[{data:bomData},{data:safetyRules},{data:allowedData}]=await Promise.all([
    sb.from('momos_product_bom').select('*').eq('is_active',true),
    sb.from('momos_safety_stock_rules').select('*').order('priority',{ascending:false}),
    sb.from('momos_item_allowed_products').select('item_code,product_code'),
  ]);

  const allowedMap={};(allowedData||[]).forEach(r=>{if(!allowedMap[r.item_code])allowedMap[r.item_code]=[];allowedMap[r.item_code].push(r.product_code);});

  function matchBom(bom,stock){
    if(bom.origin!==stock.origin)return false;
    if(bom.processing_condition&&!bom.processing_condition.split(';').map(s=>s.trim()).includes(stock.processing))return false;
    // 이카운트 연동 데이터는 variety/grade가 null일 수 있음 → 비어있으면 조건 무시(매칭 허용)
    if(bom.variety_condition&&stock.variety&&!bom.variety_condition.split(';').map(s=>s.trim()).includes(stock.variety))return false;
    if(bom.grade_condition&&stock.grade&&!bom.grade_condition.split(';').map(s=>s.trim()).includes(stock.grade))return false;
    return true;
  }
  function getSafetyDays(stock){
    const rules=(safetyRules||[]).filter(r=>{
      if(r.origin!==stock.origin)return false;
      if(r.variety_condition&&r.variety_condition!==stock.variety)return false;
      if(r.processing_condition&&r.processing_condition!==stock.processing)return false;
      if(r.grade_condition&&r.grade_condition!==stock.grade)return false;
      if(r.stock_type&&r.stock_type!=='공통'&&r.stock_type!==stock.stock_type)return false;
      return true;
    });
    if(!rules.length)return SAFETY_DAYS;
    rules.sort((a,b)=>(b.priority||0)-(a.priority||0));
    return rules[0].safety_days||SAFETY_DAYS;
  }

  // D-day 탭과 동일: origin+processing 기준 생산용 전체 보유량 합산 (에스쇼콜라 등 제한 무관)
  const opQtyMap={};
  latestStock.filter(s=>s.stock_type==='생산용'&&!inactiveItemSet.has(s.item_code)).forEach(s=>{
    const key=`${s.origin}||${s.processing}`;
    opQtyMap[key]=(opQtyMap[key]||0)+parseFloat(s.quantity_kg||0);
  });
  console.log('[원두별탭] opQtyMap Colombia Washed:', opQtyMap['Colombia||Washed']);
  console.log('[원두별탭] latestStock 생산용 수:', latestStock.filter(s=>s.stock_type==='생산용').length);
  console.log('[원두별탭] Colombia Washed 생산용 합계:', latestStock.filter(s=>s.stock_type==='생산용'&&s.origin==='Colombia'&&s.processing==='Washed').reduce((a,b)=>a+parseFloat(b.quantity_kg||0),0));

  // 원두별 분석 데이터 계산
  // 각 원두에 대해: BOM 기준 매칭된 생두 목록 + 각 생두의 가용량(kg) + 가용일(dday)
  function calcProductAnalysis(productCode){
    const avg=avgProd[productCode]||0; // 이 원두 1일 평균 생산량 (소모실적 → BOM 역산)
    const productBoms=(bomData||[]).filter(b=>b.product_code===productCode);

    // 이 원두에 매칭되는 재고 목록 (lot 단위)
    const matched=latestStock.filter(stock=>{
      // 생산용만 (D-day 탭과 동일 기준)
      if(stock.stock_type!=='생산용')return false;
      // 사용안함 제외
      if(inactiveItemSet.has(stock.item_code))return false;
      // 허용여부 체크 (창고별 합산 후 _lot_keys 배열의 모든 key 참조)
      if(stock.restrict_type==='특정제품전용'){
        const allowedCodes=allowedMap[stock.item_code]||[];
        if(!allowedCodes.includes(productCode))return false;
      }
      // BOM 중 하나라도 매칭되면 포함
      return productBoms.some(b=>matchBom(b,stock));
    });

    // 각 매칭 재고에 대해 상세 계산
    const stockDetails=matched.map(stock=>{
      // 이 생두가 이 원두에 기여하는 배합비율 합계
      const matchedBoms=productBoms.filter(b=>matchBom(b,stock));
      const ratio=matchedBoms.reduce((s,b)=>s+parseFloat(b.ratio||0),0); // %

      const qty=parseFloat(stock.quantity_kg||0);
      const totalDU=getDU(stock); // 이 생두의 전체 1일 소모량 (모든 원두 합산)
      const myDU=avg*(ratio/100);  // 이 원두의 이 생두 1일 사용량 = 원두생산량 × BOM비율

      // 전체 D-DAY: D-day 탭과 동일하게 origin+processing 전체 생산용 보유량 / 전체DU
      const opTotalQty=opQtyMap[`${stock.origin}||${stock.processing}`]||0;
      const dday_total=totalDU>0?Math.floor(opTotalQty/totalDU):null;
      if(stock.origin==='Colombia'&&stock.processing==='Washed') console.log('[원두별탭] Colombia Washed lot:', stock.item_code, 'opTotalQty:', opTotalQty, 'totalDU:', totalDU, 'dday_total:', dday_total);
      // 제품 D-DAY: 이 원두에 허용된 생두(lot)의 qty / 이 원두 소모량
      const dday_solo=myDU>0?Math.floor(qty/myDU):null;
      // 이 원두 기준 투입 가능량
      const usableKg=totalDU>0?(myDU/totalDU)*qty:qty;

      const safeDay=getSafetyDays(stock);
      let status='normal';
      if(dday_total!==null){
        if(dday_total<=safeDay)status='danger';
        else if(dday_total<=safeDay*1.5)status='warning';
      }
      return{stock,ratio,qty,totalDU,myDU,dday_total,dday_solo,usableKg,safeDay,status};
    });

    // 병목 가용일 (가장 짧은 D-day 생두가 제약)
    const validDdays=stockDetails.filter(d=>d.dday_total!==null).map(d=>d.dday_total);
    const bottleneckDday=validDdays.length?Math.min(...validDdays):null;
    const bottleneckStatus=bottleneckDday===null?'none':
      stockDetails.find(d=>d.dday_total===bottleneckDday)?.status||'normal';

    return{productCode,avg,stockDetails,bottleneckDday,bottleneckStatus,missingBom:productBoms.length===0};
  }

  const analysisData=(products||[]).map(p=>calcProductAnalysis(p.product_code));
  window._psActiveProduct=window._psActiveProduct||(products?.[0]?.product_code||null);

  function renderProductStockTab(productCode){

    // 생산기록 없는 경우

    const rowsHtml=ana.stockDetails.length?ana.stockDetails.sort((a,b)=>(a.dday_total??9999)-(b.dday_total??9999)).map((d,i)=>{
      const statusBadge=d.status==='danger'?'badge-danger':d.status==='warning'?'badge-warning':'badge-success';
      const ddayColor=d.status==='danger'?'text-danger':d.status==='warning'?'text-warning':'text-success';
      const isBottleneck=d.dday_total===ana.bottleneckDday&&ana.bottleneckDday!==null;
      return`<tr style="${isBottleneck?'background:var(--danger-bg);':''}">
        <td>
          ${isBottleneck?'<span style="font-size:14px" title="병목 생두">🚨</span> ':
            d.status==='warning'?'<span style="font-size:14px" title="주의">⚠️</span> ':''}
          <strong>${d.stock.item_code}</strong>
        </td>
        <td>${d.stock.origin}</td>
        <td>${d.stock.processing}</td>
        <td>${d.stock.variety}</td>
        <td>${d.stock.grade}</td>
        <td><span class="badge ${d.stock.stock_type==='생산용'?'badge-success':'badge-accent'}">${d.stock.stock_type}</span></td>
        <td style="text-align:right"><strong>${d.qty.toLocaleString()}</strong> kg</td>
        <td style="text-align:right;color:var(--accent);font-weight:600">${d.ratio.toFixed(1)}%</td>
        <td style="text-align:right">${d.myDU>0?d.myDU.toFixed(1)+' kg/일':'<span class="text-muted">-</span>'}</td>
        <td style="text-align:right">${d.totalDU>0?d.totalDU.toFixed(1)+' kg/일':'<span class="text-muted">-</span>'}</td>
        <td style="text-align:right">
          ${d.dday_solo!==null
            ?`<strong class="${d.status==='danger'?'text-danger':d.status==='warning'?'text-warning':'text-success'}">${d.dday_solo}일</strong>`
            :'<span class="text-muted">-</span>'}
        </td>
        <td style="text-align:right">
          ${d.dday_total!==null

        <td style="text-align:right"><strong style="color:var(--accent)">${d.usableKg.toFixed(0)}</strong> kg</td>
        <td><span class="badge ${statusBadge}">${d.status==='danger'?'위험':d.status==='warning'?'주의':'정상'}</span><br><span style="font-size:11px;color:var(--text2)">기준 ${d.safeDay}일</span></td>
      </tr>`;
    }).join('')
    :`<tr><td colspan="14" style="text-align:center;padding:40px;color:var(--text2)">매칭되는 재고가 없습니다.<br><span style="font-size:12px;color:var(--text3)">보유현황에 해당 원산지·가공방식의 생두가 없거나 BOM이 미등록 상태입니다.</span></td></tr>`;

    el('ps-content').innerHTML=`
    <div class="kpi-grid" style="margin-bottom:16px">
      <div class="kpi-card accent">
        <div class="kpi-label">원두 1일 평균 생산량</div>
        <div class="kpi-value" style="font-size:20px">${ana.avg.toFixed(1)}<span style="font-size:13px"> kg/일</span></div>
        <div class="kpi-sub">최근 ${usedDays}일 기준</div>
      </div>
      <div class="kpi-card ${ana.bottleneckStatus==='danger'?'danger':ana.bottleneckStatus==='warning'?'warning':'success'}">
        <div class="kpi-label">병목 D-day (최단)</div>
        <div class="kpi-value ${ddayColor}" style="font-size:24px">${ana.bottleneckDday!==null?ana.bottleneckDday+'일':'계산불가'}</div>
        <div class="kpi-sub">가장 먼저 떨어지는 생두 기준</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">매칭 생두 lot 수</div>
        <div class="kpi-value">${ana.stockDetails.length}</div>
        <div class="kpi-sub">BOM 원산지·가공방식 기준</div>
      </div>
      <div class="kpi-card accent">
        <div class="kpi-label">총 가용 생두량</div>
        <div class="kpi-value" style="font-size:20px">${ana.stockDetails.reduce((s,d)=>s+d.usableKg,0).toFixed(0)}<span style="font-size:13px"> kg</span></div>
        <div class="kpi-sub">이 원두에 투입 가능한 생두 합계</div>
      </div>
    </div>
    <div class="card">
      <div style="font-size:13px;font-weight:700;margin-bottom:4px">투입 생두 상세</div>
      <div style="font-size:11px;color:var(--text2);margin-bottom:14px">
        🚨 병목 생두 (D-day 가장 짧은 생두) &nbsp;·&nbsp;
        제품 D-day: 이 원두 단독 생산 기준 &nbsp;·&nbsp; 전체 D-day: 전체 소모량 기준 &nbsp;·&nbsp;
        가용량: 이 원두의 비율 기준 투입 가능 추정량
      </div>
      <div class="table-wrap"><table>
        <thead><tr>
          <th>품목코드</th><th>원산지</th><th>가공방식</th><th>품종</th><th>등급</th><th>재고구분</th>
          <th style="text-align:right">보유량(kg)</th>
          <th style="text-align:right">배합비율</th>
          <th style="text-align:right">이 원두 소모</th>
          <th style="text-align:right">전체 소모</th>
          <th style="text-align:right" title="이 원두만 단독 생산 시 해당 생두의 가용일">제품 D-day<br><span style="font-size:10px;font-weight:400;color:var(--text3)">단독생산 기준</span></th>
          <th style="text-align:right" title="모든 원두 전체 소모량 기준 가용일">전체 D-day<br><span style="font-size:10px;font-weight:400;color:var(--text3)">전체소모 기준</span></th>
          <th style="text-align:right">가용량(kg)</th>
          <th>상태</th>
        </tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table></div>
    </div>`;
  }

  // 전체 원두 요약 카드
  const summaryHtml=(products||[]).map(p=>{
    const ana=analysisData.find(a=>a.productCode===p.product_code);
    const bdColor=ana?.bottleneckStatus==='danger'?'danger':ana?.bottleneckStatus==='warning'?'warning':'success';
    const bdDay=ana?.bottleneckDday;
    return`<div onclick="renderProductStockTab('${p.product_code}')" style="background:var(--bg3);border:1.5px solid ${ana?.bottleneckStatus==='danger'?'rgba(192,57,43,.35)':ana?.bottleneckStatus==='warning'?'rgba(184,115,10,.35)':'var(--border)'};border-radius:12px;padding:16px;cursor:pointer;transition:all .2s" onmouseover="this.style.borderColor='var(--accent)';this.style.background='var(--accent-bg)'" onmouseout="this.style.borderColor='${ana?.bottleneckStatus==='danger'?'rgba(192,57,43,.35)':ana?.bottleneckStatus==='warning'?'rgba(184,115,10,.35)':'var(--border)'}';this.style.background='var(--bg3)'">
      <div style="font-size:10px;color:var(--text2);font-weight:600;letter-spacing:.5px">[${p.product_type}] ${p.product_code}</div>
      <div style="font-size:14px;font-weight:700;margin:4px 0 8px;color:var(--text)">${p.product_name}</div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:11px;color:var(--text2)">${(avgProd[p.product_code]||0).toFixed(1)} kg/일</div>
        <div class="badge ${ana?.missingBom?'badge-gray':bdDay===null?'badge-gray':ana?.bottleneckStatus==='danger'?'badge-danger':ana?.bottleneckStatus==='warning'?'badge-warning':'badge-success'}" style="font-size:12px">
          ${ana?.missingBom?'BOM없음':bdDay===null?'-':bdDay+'일'}
        </div>
      </div>
    </div>`;
  }).join('');

  mc.innerHTML=`
  <div class="page-header">
    <div class="page-title">원두별 생두 현황</div>
    <div class="page-sub">기준일 ${maxDate||'-'} · 원두 BOM 기준 원산지+가공방식 매칭</div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap;">
    <span style="font-size:13px;color:var(--text2);font-weight:500">사용량 계산 기간:</span>
    ${[7,30,90].map(d=>`<button class="btn btn-sm ${usedDays===d?'btn-gold':'btn-outline'}" onclick="setPsAvgDays(${d})">${d}일</button>`).join('')}
  </div>
  <!-- 원두 요약 카드 그리드 -->
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:24px">
    ${summaryHtml||'<div class="text-muted" style="font-size:13px">등록된 원두가 없습니다.</div>'}
  </div>
  <!-- 탭 바 -->
  <div style="display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:16px;overflow-x:auto;flex-wrap:nowrap">
    ${(products||[]).map(p=>{
      const ana=analysisData.find(a=>a.productCode===p.product_code);
      const isActive=p.product_code===window._psActiveProduct;
      const dot=ana?.bottleneckStatus==='danger'?'🔴':ana?.bottleneckStatus==='warning'?'🟡':'';
      return`<div id="ps-tab-${p.product_code}" onclick="renderProductStockTab('${p.product_code}')"
        style="padding:10px 18px;cursor:pointer;font-size:13px;white-space:nowrap;color:${isActive?'var(--accent)':'var(--text2)'};border-bottom:${isActive?'2px solid var(--accent)':'2px solid transparent'};margin-bottom:-2px;font-weight:${isActive?'700':'400'};background:${isActive?'var(--accent-bg)':'transparent'};transition:all .15s">
        ${dot} ${p.product_name}
      </div>`;
    }).join('')}
  </div>
  <!-- 탭 콘텐츠 -->
  <div id="ps-content"></div>`;

  window.setPsAvgDays=(d)=>{window._psAvgDays=d;window._tabs['product-stock']();};
  window.renderProductStockTab=renderProductStockTab;

  // 초기 렌더
  if(window._psActiveProduct&&(products||[]).find(p=>p.product_code===window._psActiveProduct)){
    renderProductStockTab(window._psActiveProduct);
  }else if(products?.length){
    renderProductStockTab(products[0].product_code);
  }
};

// ══ 전환 추천 (v3.0.9: 실제 불균형 발생 시에만 표시, 전환 품목/수량/용도 포함)
window._tabs['transfer']=async()=>{
  const mc=el('main-content');mc.innerHTML='<div class="loading">분석 중...</div>';
  const{SAFETY_DAYS,maxDate,latestStock,getDU,beanNameMap,inactiveItemSet}=await loadAnalysisData();
  const prodStocks=latestStock.filter(r=>r.stock_type==='생산용'&&!inactiveItemSet.has(r.item_code));
  const saleStocks=latestStock.filter(r=>r.stock_type==='판매용'&&!inactiveItemSet.has(r.item_code));

  // 판매용: item_code 기준 재고 맵
  const saleItemMap={};
  saleStocks.forEach(ss=>{
    const key=ss.item_code;
    if(!saleItemMap[key])saleItemMap[key]={item_code:ss.item_code,origin:ss.origin,processing:ss.processing,qty:0};
    saleItemMap[key].qty+=parseFloat(ss.quantity_kg||0);
  });

  // 판매용: 원산지+가공방식 기준 합산 맵 (여러 lot 동일 origin+processing 합산)
  const saleGroupMap={};
  saleStocks.forEach(ss=>{
    const key=`${ss.origin}||${ss.processing}`;
    if(!saleGroupMap[key])saleGroupMap[key]={origin:ss.origin,processing:ss.processing,totalQty:0,items:[]};
    saleGroupMap[key].totalQty+=parseFloat(ss.quantity_kg||0);
    if(!saleGroupMap[key].items.includes(ss.item_code))saleGroupMap[key].items.push(ss.item_code);
  });

  // 생산용 재고 기준 불균형 판단: D-day < SAFETY_DAYS*1.5 이고 판매용에 동일 원산지+가공방식 재고가 있는 경우만
  const recommendations=[];
  prodStocks.forEach(ps=>{
    const du=getDU(ps);
    const qty=parseFloat(ps.quantity_kg||0);
    const dday=du>0?Math.floor(qty/du):null;
    if(dday===null||dday>SAFETY_DAYS*1.5)return; // 충분한 재고 → 추천 없음
    const opKey=`${ps.origin}||${ps.processing}`;
    const saleGroup=saleGroupMap[opKey];
    if(!saleGroup||saleGroup.totalQty<=0)return; // 판매용 재고 없음 → 추천 불가
    // 실제 불균형 존재: 생산용 부족 + 판매용 여유
    const status=dday<=SAFETY_DAYS?'danger':'warning';
    // 전환 권장량: 목표(안전재고*1.5*DU) - 현재 생산용 보유량
    const targetQty=Math.ceil(du*SAFETY_DAYS*1.5);
    const transferQty=Math.min(Math.max(0,Math.ceil(targetQty-qty)),saleGroup.totalQty);
    // 이 품목이 주로 어떤 원두에 사용되는지 (beanNameMap 기준)

      item_code:ps.item_code,itemName,
      origin:ps.origin,processing:ps.processing,
      dday,status,du,qty,
      saleQty:saleGroup.totalQty,
      saleItems:saleGroup.items,
      transferQty,targetQty
    });
  });

  // 필터: 판매용 잉여 있는 경우만 최종 표시

  <div class="kpi-grid">
    <div class="kpi-card ${dangerCnt>0?'danger':'success'}"><div class="kpi-label">즉시 전환 필요</div><div class="kpi-value">${dangerCnt}</div><div class="kpi-sub">D-day ≤ 안전재고 ${SAFETY_DAYS}일</div></div>

    <div class="kpi-card"><div class="kpi-label">전환 가능 판매용</div><div class="kpi-value">${filtered.reduce((s,r)=>s+r.saleQty,0).toLocaleString()}<span style="font-size:14px">kg</span></div><div class="kpi-sub">현재 판매용 보유량</div></div>
  </div>
  ${filtered.length?`<div class="card"><div class="table-wrap"><table>
    <thead><tr>
      <th>긴급도</th>

// ══ 구매 필요 분석
window._tabs['buyplan']=async()=>{
  const mc=el('main-content');mc.innerHTML='<div class="loading">분석 중...</div>';
  const{AVG_DAYS,SAFETY_DAYS,LEAD_TIME,TARGET_MULTI,maxDate,latestStock,getDU,getDUBreakdown,inactiveItemSet}=await loadAnalysisData();
  // 원산지별 목표 배수 로드
  const{data:allSettings}=await sb.from('momos_app_settings').select('key,value');
  const allCfg={};(allSettings||[]).forEach(r=>allCfg[r.key]=r.value);
  const getTargetMulti=(origin)=>{
    const key='target_multiplier_'+origin.replace(/\s+/g,'_');
    return parseFloat(allCfg[key])||1;
  };

  // 입항중 데이터 로드
  const{data:arrivalData}=await sb.from('momos_arrival_schedule').select('item_code,quantity_kg,expected_date').neq('status','완료').order('expected_date',{ascending:true});
  const{data:beanItemsForArr}=await sb.from('momos_green_bean_items').select('item_code,origin,processing');
  const arrBeanMap={};(beanItemsForArr||[]).forEach(b=>{arrBeanMap[b.item_code]=b;});
  // origin+processing 기준 입항중 합산
  const arrivalMap={};
  (arrivalData||[]).forEach(r=>{
    const b=arrBeanMap[r.item_code];
    if(!b)return;
    const key=`${b.origin}||${b.processing}`;
    arrivalMap[key]=(arrivalMap[key]||0)+parseFloat(r.quantity_kg||0);
  });

  // 생산용만, 원산지+가공방식 기준으로 합산
  const groupMap={};
  latestStock.filter(r=>r.stock_type==='생산용'&&!inactiveItemSet.has(r.item_code)).forEach(stock=>{
    const key=`${stock.origin}||${stock.processing}`;
    const du=getDU(stock);
    if(!groupMap[key])groupMap[key]={origin:stock.origin,processing:stock.processing,qty:0,du:0,breakdown:null};
    groupMap[key].qty+=parseFloat(stock.quantity_kg||0);
    // du는 같은 origin+processing이면 동일값 — lot 수만큼 중복합산 방지
    if(du>groupMap[key].du){groupMap[key].du=du;groupMap[key].breakdown=getDUBreakdown(stock);}
  });

  // 기준: D-day < 안전재고 + 리드타임 이면 표시
  const threshold=SAFETY_DAYS+LEAD_TIME;
  const results=Object.values(groupMap).map(g=>{
    const du=g.du;
    const qty=g.qty;
    const dday=du>0?Math.floor(qty/du):null;
    // 추천 구매량: (안전재고+리드타임) 기준 목표재고 - 현재보유
    const originMulti=getTargetMulti(g.origin);
    const targetQty=du*(SAFETY_DAYS+LEAD_TIME)*originMulti;
    const buyQty=Math.max(0,Math.ceil(targetQty-qty));
    const urgency=dday!==null&&dday<=LEAD_TIME?'즉시':'예정';
    const arrivalKg=arrivalMap[`${g.origin}||${g.processing}`]||0;
    const qtyWithArr=qty+arrivalKg;
    const dday_with_arr=du>0?Math.floor(qtyWithArr/du):null;
    return{origin:g.origin,processing:g.processing,qty,arrivalKg,qtyWithArr,du,dday,dday_with_arr,buyQty,targetQty,urgency,originMulti,breakdown:g.breakdown};
  }).filter(r=>r.du>0&&r.dday!==null&&r.dday<threshold)
    .sort((a,b)=>(a.dday||9999)-(b.dday||9999));

  const urgentCnt=results.filter(r=>r.urgency==='즉시').length;
  mc.innerHTML=`
  <div class="page-header"><div class="page-title">구매 필요 분석</div><div class="page-sub">기준일 ${maxDate||'-'} · 안전재고 ${SAFETY_DAYS}일 + 리드타임 ${LEAD_TIME}일 = 기준 ${threshold}일 미만 시 표시</div></div>
  ${urgentCnt>0?`<div class="alert alert-danger">⚠️ 즉시 구매 필요 ${urgentCnt}건 — D-day가 리드타임(${LEAD_TIME}일) 이하입니다.</div>`:''}
  <div class="kpi-grid">
    <div class="kpi-card ${urgentCnt>0?'danger':'success'}"><div class="kpi-label">즉시 구매 필요</div><div class="kpi-value">${urgentCnt}</div><div class="kpi-sub">D-day ≤ 리드타임 ${LEAD_TIME}일</div></div>
    <div class="kpi-card ${results.filter(r=>r.urgency==='예정').length>0?'warning':'success'}"><div class="kpi-label">구매 예정</div><div class="kpi-value">${results.filter(r=>r.urgency==='예정').length}</div><div class="kpi-sub">D-day < 안전+리드타임 ${threshold}일</div></div>
    <div class="kpi-card accent"><div class="kpi-label">총 추천 구매량</div><div class="kpi-value">${results.reduce((s,r)=>s+r.buyQty,0).toLocaleString()}<span style="font-size:14px">kg</span></div></div>
  </div>
  <div class="card"><div class="table-wrap"><table>
    <thead><tr><th>긴급도</th><th>원산지</th><th>가공방식</th><th style="text-align:right">현재보유(kg)</th><th style="text-align:right">입항중(kg)</th><th style="text-align:right">1일사용량</th><th style="text-align:right">D-day<br><span style="font-size:10px;font-weight:400">현재보유</span></th><th style="text-align:right">D-day<br><span style="font-size:10px;font-weight:400">입항중 포함</span></th><th style="text-align:right">추천구매량(kg)</th></tr></thead>
    <tbody>${!results.length
      ?`<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text2)">구매 필요 품목이 없습니다.<br><span style="font-size:12px;color:var(--text3)">모든 생두의 D-day가 안전재고(${SAFETY_DAYS}일) + 리드타임(${LEAD_TIME}일) = ${threshold}일 이상입니다.</span></td></tr>`
      :results.map(r=>`<tr>
        <td><span class="badge ${r.urgency==='즉시'?'badge-danger':'badge-warning'}">${r.urgency}</span></td>
        <td><strong>${r.origin}</strong></td>
        <td>${r.processing}</td>
        <td style="text-align:right">${r.qty.toLocaleString()} kg</td>
        <td style="text-align:right">${r.arrivalKg>0?`<span style="color:var(--accent);font-weight:600">${r.arrivalKg.toLocaleString()} kg</span>`:'<span class="text-muted">-</span>'}</td>
        <td style="text-align:right">${(()=>{
          if(r.du<=0)return '<span class="text-muted">-</span>';
          const bd=r.breakdown;

          const sorted=[...bd.breakdown].sort((a,b)=>b.contribution-a.contribution);
          const rows=sorted.map(item=>{

            return `<div style="display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:1px solid var(--border);font-size:11px">
              <div style="flex:1;min-width:0"><span style="color:var(--accent);font-weight:600">${item.product_code}</span>${item.product_name?`<span style="color:var(--text2);margin-left:4px;font-size:10px">${item.product_name}</span>`:''}</div>
              <div style="text-align:right;white-space:nowrap;color:var(--text2)">${item.avg_prod_per_day.toFixed(1)}kg/일 × ${item.ratio_pct}%</div>
              <div style="text-align:right;white-space:nowrap;font-weight:700;min-width:52px">= <span style="color:var(--accent)">${item.contribution.toFixed(1)}kg</span> <span style="font-size:10px;color:var(--text3)">(${pct}%)</span></div>

          return `<details style="text-align:right"><summary style="cursor:pointer;list-style:none;font-size:13px;font-weight:600;color:var(--text)">${r.du.toFixed(1)} kg/일 <span style="font-size:11px;color:var(--accent)">▼</span></summary><div style="text-align:left;margin-top:4px;min-width:320px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;box-shadow:var(--shadow-md)">${rows}</div></details>`;

        <td style="text-align:right"><strong class="${r.urgency==='즉시'?'text-danger':'text-warning'}" style="font-size:16px">${r.dday}일</strong></td>
        <td style="text-align:right">${r.dday_with_arr!==null?`<strong class="${r.dday_with_arr<=LEAD_TIME?'text-danger':r.dday_with_arr<=SAFETY_DAYS?'text-warning':'text-success'}" style="font-size:16px">${r.dday_with_arr}일</strong>${r.arrivalKg>0?'<span style="font-size:10px;color:var(--accent);margin-left:2px">+입항</span>':''}`:'-'}</td>

            <div style="display:flex;justify-content:space-between;gap:12px"><span style="color:var(--text2)">① 1일 사용량</span><strong>${r.du.toFixed(1)} kg/일</strong></div>
            <div style="display:flex;justify-content:space-between;gap:12px"><span style="color:var(--text2)">② 안전재고 기준</span><strong>${SAFETY_DAYS}일</strong></div>

            <div style="border-top:1px dashed var(--border);margin:4px 0"></div>
            <div style="display:flex;justify-content:space-between;gap:12px"><span style="color:var(--text2)">목표재고 = ① × (②+③) × ④</span><strong style="color:var(--accent)">${targetQty.toLocaleString()} kg</strong></div>

// ══ 저회전·장기재고
window._tabs['slowstock']=async()=>{
  const mc=el('main-content');mc.innerHTML='<div class="loading">분석 중...</div>';
  const selDays=window._ssAvgDays||30;

  // 설정값 + 재고 로드
  const{data:settings}=await sb.from('momos_app_settings').select('key,value');
  const cfg={};(settings||[]).forEach(r=>cfg[r.key]=r.value);
  const SLOW_KG=parseFloat(cfg.slow_moving_kg_per_day||'1.0');
  const SLOW_DAYS=parseInt(cfg.slow_moving_days||'90');
  const AGED_DAYS=parseInt(cfg.aged_stock_days||'180');

  // 기간 cutoff
  const cutoffKST=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
  cutoffKST.setDate(cutoffKST.getDate()-selDays);
  const cutoffStr=cutoffKST.toISOString().split('T')[0];

  // 재고 + 소모실적(생산+판매 전부) + 품목 마스터(입고일) 병렬 로드
  const[{data:stockData},{data:conData},{data:beanMasterData}]=await Promise.all([
    sb.from('momos_green_bean_stock').select('*').eq('is_active',true).order('base_date',{ascending:false}).range(0,9999),
    sb.from('momos_green_bean_consumption').select('item_code,quantity_kg,consume_date,consume_type').gte('consume_date',cutoffStr).range(0,9999),
    sb.from('momos_green_bean_items').select('item_code,item_name,arrival_date,unit_price_kg').eq('is_active',true),
  ]);

  // 품목코드 → 마스터 입고일 맵
  const masterArrivalMap={};
  const masterNameMap={};
  (beanMasterData||[]).forEach(r=>{masterArrivalMap[r.item_code]=r.arrival_date;masterNameMap[r.item_code]=r.item_name;});
  // 보유현황과 동일하게 전체 재고 row 사용 (날짜 구분 없음)
  const latestStock=stockData||[];
  const maxDate=(stockData||[]).reduce((m,r)=>r.base_date>m?r.base_date:m,'');

  // 품목코드별 실제 소모량 집계 (생산/판매 구분)
  const conByItem={};
  const conProdByItem={};
  const conSaleByItem={};
  (conData||[]).forEach(r=>{
    const kg=parseFloat(r.quantity_kg||0);
    conByItem[r.item_code]=(conByItem[r.item_code]||0)+kg;
    if(r.consume_type==='생산소모') conProdByItem[r.item_code]=(conProdByItem[r.item_code]||0)+kg;
    else conSaleByItem[r.item_code]=(conSaleByItem[r.item_code]||0)+kg;
  });
  // 1일 사용량 = 기간 내 총소모 ÷ selDays
  function getActualDU(item_code){
    return (conProdByItem[item_code]||0)/selDays;  // 생산소모만 기준
  }

  const today=new Date();
  // 품목 마스터에서 단가도 함께 로드
  const masterPriceMap={};
  (beanMasterData||[]).forEach(r=>{masterPriceMap[r.item_code]=r.unit_price_kg;});

  const results=latestStock.map(stock=>{
    const du=getActualDU(stock.item_code);
    const totalCon=conByItem[stock.item_code]||0;
    const prodCon=conProdByItem[stock.item_code]||0;
    const saleCon=conSaleByItem[stock.item_code]||0;
    const masterArrival=masterArrivalMap[stock.item_code];
    const arrivalDateStr=masterArrival||stock.arrival_date||stock.base_date;
    const arrivedDate=new Date(arrivalDateStr);
    const elapsed=Math.floor((today-arrivedDate)/86400000);
    const isSlow=du<SLOW_KG;
    const isLong=elapsed>=SLOW_DAYS;
    const isAged=elapsed>=AGED_DAYS;
    const tags=[];
    if(isAged)tags.push('노화재고');
    if(isLong&&!isAged)tags.push('장기보관');
    if(isSlow)tags.push('저회전');
    const qty=parseFloat(stock.quantity_kg||0);
    const unitPrice=parseFloat(masterPriceMap[stock.item_code]||0);
    const totalAmt=unitPrice>0?qty*unitPrice:null;
    return{...stock,du,totalCon,prodCon,saleCon,arrivalDateStr,elapsed,isSlow,isLong,isAged,tags,qty,unitPrice,totalAmt};
  }).sort((a,b)=>b.elapsed-a.elapsed);
  const allStockKg=(stockData||[]).reduce((s,r)=>s+parseFloat(r.quantity_kg||0),0);
  const flaggedResults=results.filter(r=>r.tags.length>0);

    window._calYear=nowKST.getFullYear();

  }
  const year=window._calYear,month=window._calMonth;

  // 한국 공휴일 (고정 + 대체공휴일 규칙 포함)
  function getKoreanHolidays(y){
    const h={};
    const add=(m,d,name)=>{h[`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`]=name;};
    add(1,1,'신정');add(3,1,'삼일절');add(5,5,'어린이날');add(6,6,'현충일');
    add(8,15,'광복절');add(10,3,'개천절');add(10,9,'한글날');add(12,25,'성탄절');
    // 음력 기반 공휴일 (근사값 - 주요 연도)
    const lunar={
      2024:{설날:[[2,9],[2,10],[2,11]],추석:[[9,16],[9,17],[9,18]],부처님오신날:[[5,15]]},
      2025:{설날:[[1,28],[1,29],[1,30]],추석:[[10,5],[10,6],[10,7]],부처님오신날:[[5,5]]},
      2026:{설날:[[2,17],[2,18],[2,19]],추석:[[9,24],[9,25],[9,26]],부처님오신날:[[5,24]]},
      2027:{설날:[[2,6],[2,7],[2,8]],추석:[[9,14],[9,15],[9,16]],부처님오신날:[[5,13]]},
    };
    if(lunar[y]){
      Object.entries(lunar[y]).forEach(([name,dates])=>{
        dates.forEach(([m,d])=>add(m,d,name));
      });
    }
    // 대체공휴일: 공휴일이 일요일이면 다음 월요일, 토요일이면 다음 월요일(설·추석·어린이날만)
    const keys=Object.keys(h);
    const extra={};
    keys.forEach(dateStr=>{
      const dt=new Date(dateStr);const dow=dt.getDay();
      const name=h[dateStr];
      const isLunar=name==='설날'||name==='추석'||name==='부처님오신날'||name==='어린이날';
      if(dow===0){// 일요일
        let nd=new Date(dt);nd.setDate(nd.getDate()+1);
        while(h[nd.toISOString().slice(0,10)]||extra[nd.toISOString().slice(0,10)])nd.setDate(nd.getDate()+1);

        extra[nd.toISOString().slice(0,10)]='대체공휴일';
      }
    });

        <div class="form-group"><label>원두 *</label><select class="sel" id="cal-tf-prod"><option value="">원두 선택</option>${(calProds||[]).map(p=>`<option value="${p.product_code}">[${p.product_type}] ${p.product_code} ${p.product_name}</option>`).join('')}</select></div>
        <div class="form-group"><label>이동처(창고) *</label><select class="sel" id="cal-tf-wh"><option value="">창고 선택</option>${(calWhs||[]).map(w=>`<option value="${w.warehouse_id}" data-name="${w.warehouse_name}">${w.warehouse_name}</option>`).join('')}</select></div>
        <div class="form-group"><label>이동량(kg) *</label><input class="inp" type="number" id="cal-tf-qty" min="0.01" step="0.01" placeholder="예: 500"></div>
        <div class="form-group"><label>비고</label><input class="inp" type="text" id="cal-tf-note"></div>
      </div>
      <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('cal-modal')">취소</button><button class="btn btn-gold" onclick="saveCalItem()">저장</button></div>
    </div>
  </div>`;

  let _calType='';
  window.openCalModal=(type)=>{
    _calType=type;
    const titles={'prod':'원두생산 등록','prod-con':'생산소모 등록','sale-con':'판매소모 등록','transfer':'원두이동 등록'};
    el('cal-modal-title').textContent=titles[type]||'등록';
    ['prod','prod-con','sale-con','transfer'].forEach(t=>{const f=el('cal-form-'+t);if(f)f.style.display=t===type?'block':'none';});
    el('cal-date').value=todayStr;
    openModal('cal-modal');
  };

  window.saveCalItem=async()=>{
    const date=el('cal-date').value;
    if(!date)return alert('날짜를 입력하세요.');
    if(_calType==='prod'){
      const code=el('cal-prod-code').value,qty=parseFloat(el('cal-prod-qty').value),note=inp('cal-prod-note');
      if(!code||!qty)return alert('원두와 생산량은 필수입니다.');
      const{error}=await sb.from('momos_production_records').insert({production_date:date,product_code:code,produced_kg:qty,note:note||null,uploaded_by:window._user?.username||null});
      if(error)return alert('저장 실패: '+error.message);
    } else if(_calType==='prod-con'){
      const prodEl=el('cal-con-prod'),beanEl=el('cal-con-bean');
      const lpc=prodEl.value,lpn=prodEl.options[prodEl.selectedIndex]?.dataset?.name||'';
      const ic=beanEl.value,iname=beanEl.options[beanEl.selectedIndex]?.dataset?.name||'';
      const qty=parseFloat(el('cal-con-qty').value),note=inp('cal-con-note');
      if(!lpc||!ic||!qty)return alert('연결 원두, 생두 품목, 소모량은 필수입니다.');
      const{error}=await sb.from('momos_green_bean_consumption').insert({consume_date:date,consume_type:'생산소모',item_code:ic,item_name:iname,quantity_kg:qty,linked_product_code:lpc,linked_product_name:lpn,note:note||null,uploaded_by:window._user?.username||null});
      if(error)return alert('저장 실패: '+error.message);
    } else if(_calType==='sale-con'){
      const beanEl=el('cal-sale-bean');
      const ic=beanEl.value,iname=beanEl.options[beanEl.selectedIndex]?.dataset?.name||'';
      const qty=parseFloat(el('cal-sale-qty').value),note=inp('cal-sale-note');
      if(!ic||!qty)return alert('생두 품목과 판매량은 필수입니다.');
      const{error}=await sb.from('momos_green_bean_consumption').insert({consume_date:date,consume_type:'판매소모',item_code:ic,item_name:iname,quantity_kg:qty,linked_product_code:null,linked_product_name:null,note:note||null,uploaded_by:window._user?.username||null});
      if(error)return alert('저장 실패: '+error.message);
    } else if(_calType==='transfer'){
      const whEl=el('cal-tf-wh');
      const wid=whEl.value,wname=whEl.options[whEl.selectedIndex]?.dataset?.name||'';
      const code=el('cal-tf-prod').value,qty=parseFloat(el('cal-tf-qty').value),note=inp('cal-tf-note');
      if(!code||!wid||!qty)return alert('원두, 이동처, 이동량은 필수입니다.');
      const{error}=await sb.from('momos_roasted_transfers').insert({transfer_date:date,product_code:code,warehouse_id:wid,warehouse_name:wname,quantity_kg:qty,note:note||null,uploaded_by:window._user?.username||null});
      if(error)return alert('저장 실패: '+error.message);
    }
    closeModal('cal-modal');
    window._tabs['calendar']();
  };
};

// ══ 원두별 생두 현황
window._tabs['product-stock']=async()=>{
  const mc=el('main-content');mc.innerHTML='<div class="loading">원두별 생두 현황 계산 중...</div>';
  const selDays=window._psAvgDays||null;
  const{AVG_DAYS,SAFETY_DAYS,maxDate,latestStock,getDU,products,avgProd,inactiveItemSet}=await loadAnalysisData(selDays?{avg_days_override:selDays}:{});
  const usedDays=selDays||AVG_DAYS;

  // 안전재고 규칙 + BOM + 입항중 추가 로드
  const[{data:safetyRules},{data:bomData},{data:arrivalData},{data:allowedData},{data:beanItemsAll}]=await Promise.all([
    sb.from('momos_safety_stock_rules').select('*').order('priority',{ascending:false}),
    sb.from('momos_product_bom').select('*').eq('is_active',true),
    sb.from('momos_arrival_schedule').select('item_code,quantity_kg,expected_date').neq('status','완료').order('expected_date',{ascending:true}),
    sb.from('momos_item_allowed_products').select('item_code,product_code'),
    sb.from('momos_green_bean_items').select('item_code,item_name,origin,processing,variety,grade,restrict_type').eq('is_active',true),
  ]);

  // item_code 기반 allowedMap (마스터 설정 기준)
  const allowedMap={};(allowedData||[]).forEach(r=>{if(!allowedMap[r.item_code])allowedMap[r.item_code]=[];allowedMap[r.item_code].push(r.product_code);});
  const beanAttrMap={};(beanItemsAll||[]).forEach(b=>{beanAttrMap[b.item_code]=b;});

  // 입항중: origin|processing → [{expected_date, quantity_kg, item_code}]
  const arrivalMap={};
  (arrivalData||[]).forEach(r=>{
    const b=beanAttrMap[r.item_code];if(!b)return;
    const key=`${b.origin}|${b.processing}`;
    if(!arrivalMap[key])arrivalMap[key]=[];
    arrivalMap[key].push({date:r.expected_date,kg:parseFloat(r.quantity_kg||0),item_code:r.item_code});
  });

  // 안전재고 일수 계산
  function getSafetyDays(stock){
    const rules=(safetyRules||[]).filter(r=>{
      if(r.origin!==stock.origin)return false;
      if(r.variety_condition&&r.variety_condition!==stock.variety)return false;
      if(r.processing_condition&&r.processing_condition!==stock.processing)return false;
      if(r.grade_condition&&r.grade_condition!==stock.grade)return false;
      if(r.stock_type&&r.stock_type!=='공통'&&r.stock_type!==stock.stock_type)return false;
      return true;
    });
    if(!rules.length)return SAFETY_DAYS;
    rules.sort((a,b)=>(b.priority||0)-(a.priority||0));
    return rules[0].safety_days||SAFETY_DAYS;
  }

  // BOM 매칭 함수 (origin+processing 기준)
  function matchBomByOP(bom, origin, processing){
    if(bom.origin!==origin)return false;
    if(bom.processing_condition){
      const pcs=bom.processing_condition.split(';').map(s=>s.trim());
      if(!pcs.includes(processing))return false;
    }
    return true;
  }

  // 원두별로 계산
  // D-day 탭과 동일: origin+processing 기준 생산용 전체 보유량 합산
  const opQtyMap={};

  // ── [제품 특정/혼합 D-DAY 사전 계산] ──
  // BOM 기준: 각 origin+processing 조합을 사용하는 product_code 목록 구성
  // matchBomByOP가 이 아래에 선언되므로, 여기서는 먼저 bomData 기준으로 색인만 만들고
  // 실제 계산은 bomLines 루프 내에서 수행
  latestStock.filter(s=>s.stock_type==='생산용'&&!inactiveItemSet.has(s.item_code)).forEach(s=>{
    const key=`${s.origin}||${s.processing}`;
    opQtyMap[key]=(opQtyMap[key]||0)+parseFloat(s.quantity_kg||0);
  });
  // [디버그] Colombia Washed restrict_type 분포 확인
  const dbgColRt=latestStock.filter(s=>s.stock_type==='생산용'&&s.origin==='Colombia'&&s.processing==='Washed');
  console.log('[restrict] Colombia Washed restrict_type 분포:', JSON.stringify(dbgColRt.map(r=>({ic:r.item_code,rt:r.restrict_type,qty:r.quantity_kg}))));

  // ── BOM origin+processing 기준으로 사용하는 제품 목록 색인 구성 ──
  // key: "origin||processing", value: Set of product_code
  const bomOPProductsMap={};
  (bomData||[]).forEach(b=>{
    const procs=(b.processing_condition||'').split(';').map(s=>s.trim()).filter(Boolean);
    const procList=procs.length?procs:[''];
    procList.forEach(proc=>{
      const key=`${b.origin}||${proc}`;
      if(!bomOPProductsMap[key])bomOPProductsMap[key]=new Set();
      bomOPProductsMap[key].add(b.product_code);
    });
  });

  const productResults=(products||[]).map(p=>{
    const avgKgDay=avgProd[p.product_code]||0;

    // 이 원두에 BOM 등록된 원산지+가공방식 목록
    const myBoms=(bomData||[]).filter(b=>b.product_code===p.product_code);

    // BOM 항목별로 생두 재고 집계
    const bomLines=myBoms.map(bom=>{
      const ratio=parseFloat(bom.ratio||0)/100;
      // 이 BOM에 해당하는 생두 재고 찾기 (원산지+가공방식 매칭)
      const matchedStocks=latestStock.filter(s=>{
        if(s.stock_type!=='생산용')return false;
        if(!matchBomByOP(bom,s.origin,s.processing))return false;
        if(inactiveItemSet.has(s.item_code))return false;
        // ★ restrict_type은 stock 테이블 값이 아닌 마스터(beanAttrMap) 기준으로 판단
        const masterRestrict=(beanAttrMap[s.item_code]?.restrict_type)||s.restrict_type||'공용';
        if(masterRestrict==='특정제품전용'){
          const allowed=allowedMap[s.item_code]||[];
          if(!allowed.includes(p.product_code))return false;
        }
        return true;
      });
      // [디버그] Colombia Washed BOM에서 matchedStocks 결과 출력
      if(bom.origin==='Colombia'&&(bom.processing_condition||'').includes('Washed')&&p.product_code==='MMS0001'){
        const allCol=latestStock.filter(s=>s.stock_type==='생산용'&&s.origin==='Colombia'&&s.processing==='Washed');
        const failInactive=allCol.filter(s=>inactiveItemSet.has(s.item_code)).map(s=>s.item_code);
        const failRestrict=allCol.filter(s=>s.restrict_type==='특정제품전용').map(s=>({ic:s.item_code,rt:s.restrict_type,lots:s._lot_keys}));
        const failBomOP=allCol.filter(s=>!matchBomByOP(bom,s.origin,s.processing)).map(s=>s.item_code);
        console.log('[디버그MMS0001] Colombia Washed 전체:',allCol.length,'개, 합계:',allCol.reduce((a,b)=>a+parseFloat(b.quantity_kg||0),0).toFixed(2));
        console.log('[디버그MMS0001] matchedStocks:',matchedStocks.length,'개, 합계:',matchedStocks.reduce((a,b)=>a+parseFloat(b.quantity_kg||0),0).toFixed(2));
        console.log('[디버그MMS0001] 탈락-inactive:',failInactive);
        console.log('[디버그MMS0001] 탈락-restrict:',JSON.stringify(failRestrict));
        console.log('[디버그MMS0001] 탈락-bomOP:',failBomOP);
      }
      const totalStockKg=matchedStocks.reduce((sum,s)=>sum+parseFloat(s.quantity_kg||0),0);

      // 이 생두의 1일 소모량 (이 원두 기준)
      const duForThis=avgKgDay*ratio; // 이 원두 하루 생산량 × 배합비율

      // 가장 안전재고 기준이 강한 stock 기준으로 safeDay 계산
      const safeDay=matchedStocks.length>0?getSafetyDays(matchedStocks[0]):SAFETY_DAYS;

      // ── 생두 분류: lot별로 전용/공유 판별 ──
      const bomFirstProc=(bom.processing_condition||'').split(';')[0].trim();

      // 전용(exclusive): 마스터 restrict_type=특정제품전용 AND allowedMap에 이 제품만 있는 lot
      const exclusiveStocks=matchedStocks.filter(s=>{
        const masterRestrict=(beanAttrMap[s.item_code]?.restrict_type)||s.restrict_type||'공용';
        if(masterRestrict!=='특정제품전용')return false;
        const allowed=allowedMap[s.item_code]||[];
        // 허용 목록이 이 제품 하나뿐이면 전용
        return allowed.length===1&&allowed[0]===p.product_code;
      });

      // 공유(shared): 공용이거나, 특정제품전용이지만 여러 제품에 허용된 lot
      const sharedStocks=matchedStocks.filter(s=>!exclusiveStocks.includes(s));

      // [디버그] COL6415 판별 확인
      if(p.product_code==='MMS0001'){
        const col6415=matchedStocks.find(s=>s.item_code==='COL6415');
        if(col6415){
          console.log('[COL6415 판별]',
            'restrict_type:', col6415.restrict_type,
            'allowedMap:', JSON.stringify(allowedMap['COL6415']),
            'exclusiveStocks에 포함:', exclusiveStocks.some(s=>s.item_code==='COL6415'),
            'sharedStocks에 포함:', sharedStocks.some(s=>s.item_code==='COL6415')
          );
        }
      }

      // 공유 생두를 사용하는 다른 BOM (혼합 D-day 계산용)
      // - "공유 생두"란 sharedStocks에서 실제로 접근 가능한 다른 제품 BOM이 있는 경우
      const otherBomsForShared=sharedStocks.length>0
        ?(bomData||[]).filter(b2=>{
          if(b2.product_code===p.product_code)return false;
          if(!matchBomByOP(b2,bom.origin,bomFirstProc))return false;
          // 이 다른 제품이 sharedStocks 중 실제로 접근 가능한 lot이 있는지 확인 (마스터 기준)
          return sharedStocks.some(s=>{
            const masterRestrict=(beanAttrMap[s.item_code]?.restrict_type)||s.restrict_type||'공용';
            if(masterRestrict==='특정제품전용'){
              const allowed=allowedMap[s.item_code]||[];
              return allowed.includes(b2.product_code);
            }
            return true; // 공용 lot은 모든 제품 접근 가능
          });
        })
        :[];
      const isShared=sharedStocks.length>0&&otherBomsForShared.length>0;
      const hasExclusive=exclusiveStocks.length>0;

      // otherBoms: 혼합 D-day 계산용
      const otherBoms=otherBomsForShared;

      // ── 재고 분리: 전용 / 공유 ──
      // 전용(특정): restrict_type=특정제품전용이고 이 제품만 허용된 lot
      // 공유(혼합): 공용이거나 여러 제품에 허용된 lot
      const exclusiveStockList=exclusiveStocks; // 이미 위에서 계산
      const sharedStockList=sharedStocks;       // 이미 위에서 계산

      const specificStockKg=exclusiveStockList.reduce((sum,s)=>sum+parseFloat(s.quantity_kg||0),0);
      const mixedStockKg=sharedStockList.reduce((sum,s)=>sum+parseFloat(s.quantity_kg||0),0);

      // ── 소모량 정의 ──
      // 전용 1일소모량: 이 원두의 1일 사용량 (이 원두에만 쓰이므로 그대로)
      const specificDuForThis=duForThis;

      // 혼합 1일소모량: 이 공유 생두를 사용하는 모든 원두의 1일 사용량 합계
      // 예) A생두가 에스쇼콜라(160kg/일) + 프루티봉봉(40kg/일) → 200kg/일
      let mixedDuForThis=0;
      let dday_mixed=null;
      if(isShared&&mixedStockKg>0){
        const allUsingBoms=[bom,...otherBoms];
        mixedDuForThis=allUsingBoms.reduce((sum,b2)=>{
          const prodAvgKg=avgProd[b2.product_code]||0;
          const bRatio=parseFloat(b2.ratio||0)/100;
          return sum+(prodAvgKg*bRatio);
        },0);
        dday_mixed=mixedDuForThis>0?Math.floor(mixedStockKg/mixedDuForThis):null;
      }

      // 제품 특정 D-DAY: 전용 재고 ÷ 이 원두 1일 사용량
      const dday_specific=specificStockKg>0&&duForThis>0?Math.floor(specificStockKg/duForThis):null;

      // 상태 판단: 특정/혼합 중 더 위험한 값 기준
      const validDdays=[dday_specific,dday_mixed].filter(d=>d!==null);
      const ddayForStatus=validDdays.length?Math.min(...validDdays):null;
      const dday=ddayForStatus;

      let status='normal';
      if(dday!==null){
        if(dday<=safeDay)status='danger';
        else if(dday<=safeDay*1.5)status='warning';
      }
      if(dday===null&&totalStockKg===0)status='empty';

      // 입항중
      const firstProc=(bom.processing_condition||'').split(';')[0].trim();
      const arrKeySimple=`${bom.origin}|${firstProc}`;
      const arrivalList=arrivalMap[arrKeySimple]||[];
      const arrivalKg=arrivalList.reduce((s,x)=>s+x.kg,0);

      // 전체 D-day
      const duTotal=matchedStocks.length>0?getDU(matchedStocks[0]):0;
      const opKey=`${bom.origin}||${firstProc||'전체'}`;
      const opTotalQty=opQtyMap[opKey]||totalStockKg;
      const dday_all=duTotal>0?Math.floor(opTotalQty/duTotal):null;

      // 공유 제품 목록: otherBoms 기준 (sharedStocks에 접근 가능한 제품만)
      const otherBomProducts=otherBoms.map(b2=>{
        const prod=(products||[]).find(pr=>pr.product_code===b2.product_code);
        return{product_code:b2.product_code,product_name:prod?prod.product_name:''};
      });
      // lot → 접근 가능 제품 목록 맵 (드롭다운 표시용)
      const lotAccessibleMap={};
      sharedStocks.forEach(s=>{
        const masterRestrict=(beanAttrMap[s.item_code]?.restrict_type)||s.restrict_type||'공용';
        if(masterRestrict==='특정제품전용'){
          const allowed=allowedMap[s.item_code]||[];
          lotAccessibleMap[s.item_code]=otherBomProducts.filter(op=>allowed.includes(op.product_code));
        } else {
          lotAccessibleMap[s.item_code]=otherBomProducts;
        }
      });

      return{
        origin:bom.origin,
        processing:bom.processing_condition||'전체',
        ratio:bom.ratio,
        totalStockKg,
        specificStockKg,
        mixedStockKg,
        duForThis,
        specificDuForThis,
        mixedDuForThis,
        dday,
        dday_specific,
        dday_mixed,
        isShared,
        hasExclusive,
        otherBomProducts,
        lotAccessibleMap,
        dday_all,
        duTotal,
        safeDay,
        status,
        arrivalKg,
        arrivalList,
        matchedStocks,
        specificStocks:exclusiveStockList,
        mixedStocks:sharedStockList,
      };
    });

    // 이 원두의 가장 위험한 상태
    const worstStatus=bomLines.some(l=>l.status==='danger')?'danger'
      :bomLines.some(l=>l.status==='warning')?'warning'
      :bomLines.some(l=>l.status==='empty')?'empty':'normal';

    // 총 사용 가능일 (최소 D-day 기준)
    const validDdays=bomLines.map(l=>l.dday).filter(d=>d!==null);
    const minDday=validDdays.length?Math.min(...validDdays):null;

    return{product:p,avgKgDay,bomLines,worstStatus,minDday};
  });

  // 필터 상태
  window._psFilter=window._psFilter||'all';

  function renderPsCards(filter){
    window._psFilter=filter;
    ['all','danger','warning','normal'].forEach(f=>{
      const b=el('ps-f-'+f);
      if(b)b.className='btn btn-sm '+(f===filter?'btn-gold':'btn-outline');
    });

    const filtered=productResults.filter(r=>{
      if(filter==='danger')return r.worstStatus==='danger';
      if(filter==='warning')return r.worstStatus==='warning';
      if(filter==='normal')return r.worstStatus==='normal'||r.worstStatus==='empty';
      return true;
    });

    if(!filtered.length){
      el('ps-cards').innerHTML='<div class="empty" style="padding:60px">해당 조건의 원두가 없습니다.</div>';
      return;
    }

    // 정렬: 위험 → 주의 → 정상
    const order={danger:0,warning:1,empty:2,normal:3};
    filtered.sort((a,b)=>(order[a.worstStatus]||3)-(order[b.worstStatus]||3)||(a.minDday??9999)-(b.minDday??9999));

    el('ps-cards').innerHTML=filtered.map((r,ci)=>{
      const p=r.product;

      const statusBg=r.worstStatus==='danger'?'var(--danger-bg)':r.worstStatus==='warning'?'var(--warning-bg)':'var(--success-bg)';
      const statusLabel=r.worstStatus==='danger'?'⚠️ 위험':r.worstStatus==='warning'?'⚡ 주의':'✅ 정상';

      const bомRowsHtml=r.bomLines.length?r.bomLines.map((bl,bi)=>{
        // ── 색상 헬퍼 ──

        const ddayBar=(v,color)=>v!==null?`<div style="width:50px;height:3px;background:var(--bg3);border-radius:2px;margin:2px auto 0"><div style="width:${Math.min(100,Math.round(v/Math.max(bl.safeDay*3,1)*100))}%;height:100%;background:${color};border-radius:2px"></div></div>`:'';

        // ── 전용 1일소모량 드롭다운 ──

          const detail=`<div style="margin-top:6px;min-width:220px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;box-shadow:var(--shadow-md);position:relative;z-index:10">
            <div style="font-size:10px;color:var(--text3);margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border)">전용 생두 소모량 = 이 원두 생산량 × 배합비율</div>

          <td style="padding:8px 12px;text-align:center;font-size:12px">${mxDdayCell}</td>
          <td style="padding:8px 12px;text-align:center">${bl.dday_all!==null?(()=>{
            const sc_all=bl.dday_all<=bl.safeDay?'var(--danger)':bl.dday_all<=bl.safeDay*1.5?'var(--warning)':'var(--text2)';
            return `<strong style="color:${sc_all};font-size:14px">${bl.dday_all}일</strong>`;
          })():'<span style="color:var(--text3)">-</span>'}</td>
          <td style="padding:8px 12px;text-align:center;font-size:11px;color:var(--text2)">${bl.safeDay}일</td>
          <td style="padding:8px 12px;font-size:11px">${(()=>{
            const al=bl.arrivalList||[];
            if(!al.length)return '<span style="color:var(--text3)">-</span>';
            if(al.length===1){
              return `<span style="color:var(--accent);font-weight:600">${al[0].kg.toLocaleString()}kg</span><br><span style="font-size:10px;color:var(--text2)">${al[0].date}</span>`;
            }
            const totalKg=al.reduce((s,x)=>s+x.kg,0);
